<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Food Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #8EC5FC 0%, #E0C3FC 100%);
            --card-glass: rgba(255, 255, 255, 0.85); --card-border: rgba(255, 255, 255, 0.5);
            --text-dark: #2C2C2E; --text-gray: #8E8E93;
            --macro-cal: #007AFF; --macro-protein: #8A2BE2; --macro-fat: #FF4500; --macro-carbs: #32CD32;   
            --water-blue: #007AFF; --accent-red: #FF3B30; --radius: 28px;
        }

        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-dark); margin: 0; padding: 60px 20px 110px 20px; box-sizing: border-box; min-height: 100vh; }
        h2 { text-align: left; font-size: 24px; font-weight: 700; margin-bottom: 20px; margin-top: 0; color: #1C1C1E; text-shadow: 0 2px 10px rgba(255,255,255,0.5); }
        .card { background: var(--card-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--card-border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); max-width: 600px; margin-left: auto; margin-right: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-gray); font-weight: 500; }
        input[type="number"], input[type="text"], select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid rgba(0,0,0,0.05); box-sizing: border-box; font-size: 16px; background: rgba(255,255,255,0.9); color: var(--text-dark); font-family: 'Poppins', sans-serif; outline: none; transition: 0.2s; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        input:focus { border-color: var(--macro-protein); background: #fff; }
        button { border: none; padding: 16px; border-radius: 18px; width: 100%; cursor: pointer; font-weight: 600; font-size: 16px; font-family: 'Poppins', sans-serif; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        button:active { transform: scale(0.97); }
        .btn-primary { background: linear-gradient(135deg, #6B8DD6 0%, #8E37D7 100%); color: #fff; box-shadow: 0 6px 15px rgba(142, 55, 215, 0.3); }
        .btn-secondary { background: rgba(255,255,255,0.7); color: var(--text-dark); border: 1px solid rgba(0,0,0,0.05); }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        #loading-screen, #sandbox-screen { display: none; }

        .cal-donut-wrap { position: relative; width: 180px; height: 180px; margin: 0 auto 25px auto; }
        .cal-donut-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); filter: drop-shadow(0 6px 12px rgba(0,122,255,0.25)); }
        .cal-donut-wrap circle { fill: none; stroke-linecap: round; stroke-width: 14; transition: stroke-dashoffset 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .donut-inner-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .donut-title { font-size: 13px; color: var(--text-gray); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s;}
        .donut-value { font-size: 46px; font-weight: 700; margin: 0; color: var(--text-dark); line-height: 1.1; transition: color 0.3s;}
        .donut-subtitle { font-size: 14px; color: var(--text-gray); font-weight: 500; margin-top: 4px; }

        .macro-legend-card { display: flex; justify-content: space-between; background: rgba(255,255,255,0.6); padding: 15px 10px; border-radius: 24px; box-shadow: inset 0 2px 10px rgba(255,255,255,0.5); }
        .legend-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;}
        .mini-ring-wrap { position: relative; width: 56px; height: 56px; margin-bottom: 4px; }
        .mini-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .mini-ring-wrap circle { fill: none; stroke-linecap: round; stroke-width: 5; transition: stroke-dashoffset 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .mini-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .legend-title { font-size: 12px; color: var(--text-gray); font-weight: 500; }
        .legend-value { font-size: 14px; font-weight: 700; color: var(--text-dark); }

        .water-header { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; color: var(--water-blue); font-weight: 600; font-size: 18px; }
        .glasses { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: nowrap; }
        .glass { font-size: 26px; cursor: pointer; color: rgba(0,0,0,0.06); transition: all 0.3s ease; }
        @keyframes bounceDrop { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(1.2) translateY(-4px); } 100% { transform: scale(1.15) translateY(0); } }
        .glass.filled { color: var(--water-blue); transform: scale(1.15); filter: drop-shadow(0 4px 6px rgba(0,122,255,0.3)); animation: bounceDrop 0.4s ease; }
        #water-text { color: var(--text-gray); font-size: 13px; margin: 0; font-weight: 500; text-align: center; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row input { flex: 1; margin: 0; }
        .input-row button { width: 60px; flex-shrink: 0; padding: 0; border-radius: 16px; }
        .buttons-column { display: flex; flex-direction: column; gap: 12px; }

        .history-item { background: rgba(255,255,255,0.6); padding: 16px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.8); max-width: 600px; margin: 0 auto 12px auto;}
        .history-emoji { font-size: 32px; margin-right: 15px; background: #fff; width: 54px; height: 54px; display: flex; align-items: center; justify-content: center; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .history-info { flex: 1; }
        .history-info h4 { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; }
        .history-info p { margin: 0; font-size: 13px; color: var(--text-gray); font-weight: 500;}
        .delete-btn { background: rgba(255, 59, 48, 0.1); color: var(--accent-red); width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-left: 10px; flex-shrink: 0; padding: 0; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; margin-bottom: 20px; font-size: 18px; }
        .calendar-header button { width: 40px; height: 40px; padding: 0; background: rgba(255,255,255,0.5); color: var(--text-dark); border-radius: 14px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .calendar-day-name { font-size: 12px; color: var(--text-gray); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        .calendar-day { padding: 14px 0; border-radius: 14px; cursor: pointer; font-size: 15px; font-weight: 500; transition: 0.2s; background: transparent; }
        .calendar-day.empty { cursor: default; }
        .calendar-day.has-data { background: rgba(255,255,255,0.6); color: var(--text-dark); font-weight: 600; }
        .calendar-day.selected { background: var(--macro-protein); color: #fff; font-weight: 600; box-shadow: 0 6px 15px rgba(138, 43, 226, 0.3); }

        details { width: 100%; }
        summary { font-size: 15px; color: var(--macro-protein); cursor: pointer; font-weight: 600; outline: none; margin-top: 15px; list-style: none; display: flex; align-items: center; gap: 5px; }
        summary::-webkit-details-marker { display: none; }

        .bottom-nav { position: fixed; bottom: 25px; left: 20px; right: 20px; background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 35px; display: flex; justify-content: space-around; padding: 15px 10px; box-shadow: 0 20px 40px rgba(0,0,0,0.25); z-index: 1000; max-width: 600px; margin: 0 auto; }
        .nav-item { text-align: center; color: #8E8E93; font-size: 11px; font-weight: 500; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item.active { color: #FFFFFF; font-weight: 600; }
        .nav-icon { font-size: 26px; margin-bottom: 4px; transition: 0.3s; }
        .nav-item.active .nav-icon { transform: translateY(-3px); filter: drop-shadow(0 0 8px rgba(255,255,255,0.5)); }
        
        .loader-text { text-align: center; font-size: 18px; margin-top: 40vh; font-weight: 600; color: var(--text-dark); }

        /* --- СЛАЙДЕР ЯЗЫКОВ --- */
        .lang-slider-wrapper { margin-bottom: 20px; }
        .lang-slider-title { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-gray); font-weight: 500; }
        .lang-toggle { position: relative; display: flex; background: rgba(0,0,0,0.05); border-radius: 16px; padding: 4px; align-items: center; box-shadow: inset 0 2px 5px rgba(0,0,0,0.02); }
        .lang-toggle-thumb { 
            position: absolute; top: 4px; bottom: 4px; width: calc(25% - 2px); 
            background: linear-gradient(135deg, #6B8DD6 0%, #8E37D7 100%); 
            border-radius: 12px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); 
            z-index: 1; box-shadow: 0 4px 10px rgba(142, 55, 215, 0.3); 
        }
        .lang-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 24px; border: none; background: none; cursor: pointer; z-index: 2; transition: transform 0.2s; outline: none; }
        .lang-btn:active { transform: scale(0.9); }
        .lang-toggle[data-active="en"] .lang-toggle-thumb { transform: translateX(0%); }
        .lang-toggle[data-active="ru"] .lang-toggle-thumb { transform: translateX(100%); }
        .lang-toggle[data-active="es"] .lang-toggle-thumb { transform: translateX(200%); }
        .lang-toggle[data-active="zh"] .lang-toggle-thumb { transform: translateX(300%); }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader-text" id="loader-message"><i class="ph-bold ph-spinner-gap ph-spin" style="font-size: 40px; display:block; margin-bottom: 15px; color: var(--macro-protein);"></i><span data-i18n="sync">Syncing...</span></div></div>

    <div id="tab-diary-summary" class="screen active-screen">
        <div class="card" style="text-align: center;">
            <div class="cal-donut-wrap">
                <svg viewBox="0 0 200 200">
                    <circle cx="100" cy="100" r="85" style="stroke: rgba(0,0,0,0.06);"></circle>
                    <circle id="svg-cal" cx="100" cy="100" r="85" style="stroke: var(--macro-cal); stroke-dasharray: 534; stroke-dashoffset: 534;"></circle>
                </svg>
                <div class="donut-inner-text">
                    <span class="donut-title" id="main-cal-title" data-i18n="consumed">CONSUMED</span>
                    <span class="donut-value" id="cal-consumed">0</span>
                    <span class="donut-subtitle"><span data-i18n="out_of">of</span> <span id="cal-target">0</span> <span data-i18n="kcal">kcal</span></span>
                </div>
            </div>
            
            <div class="macro-legend-card">
                <div class="legend-item">
                    <div class="mini-ring-wrap">
                        <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" style="stroke: rgba(0,0,0,0.06);"></circle><circle id="svg-protein" cx="30" cy="30" r="26" style="stroke: var(--macro-protein); stroke-dasharray: 164; stroke-dashoffset: 164;"></circle></svg>
                        <div class="mini-icon"><i class="ph ph-egg" style="color: var(--macro-protein);"></i></div>
                    </div>
                    <span class="legend-title" data-i18n="protein">Protein</span>
                    <span class="legend-value" id="protein-text">0g</span>
                </div>
                <div class="legend-item">
                    <div class="mini-ring-wrap">
                        <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" style="stroke: rgba(0,0,0,0.06);"></circle><circle id="svg-fat" cx="30" cy="30" r="26" style="stroke: var(--macro-fat); stroke-dasharray: 164; stroke-dashoffset: 164;"></circle></svg>
                        <div class="mini-icon"><i class="ph ph-drop" style="color: var(--macro-fat);"></i></div>
                    </div>
                    <span class="legend-title" data-i18n="fats">Fats</span>
                    <span class="legend-value" id="fat-text">0g</span>
                </div>
                <div class="legend-item">
                    <div class="mini-ring-wrap">
                        <svg viewBox="0 0 60 60"><circle cx="30" cy="30" r="26" style="stroke: rgba(0,0,0,0.06);"></circle><circle id="svg-carbs" cx="30" cy="30" r="26" style="stroke: var(--macro-carbs); stroke-dasharray: 164; stroke-dashoffset: 164;"></circle></svg>
                        <div class="mini-icon"><i class="ph ph-grains" style="color: var(--macro-carbs);"></i></div>
                    </div>
                    <span class="legend-title" data-i18n="carbs">Carbs</span>
                    <span class="legend-value" id="carbs-text">0g</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="water-header"><i class="ph ph-drop"></i> <span data-i18n="water_title">Water (250 ml)</span></div>
            <div class="glasses" id="water-glasses">
                <div class="glass" data-index="1"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="2"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="3"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="4"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="5"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="6"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="7"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="8"><i class="ph-fill ph-drop"></i></div>
            </div>
            <p id="water-text"></p>
        </div>
        
        <div class="card">
            <div class="input-row">
                <input type="text" id="text-food-input" placeholder="What did you eat?">
                <button class="btn-primary" onclick="sendTextToAI()"><i class="ph-bold ph-paper-plane-right" style="font-size: 24px;"></i></button>
            </div>
            <div class="buttons-column">
                <button class="btn-primary" onclick="closeAndSendPhoto()"><i class="ph-bold ph-camera"></i> <span data-i18n="btn_photo">Snap a photo (tap 📎)</span></button>
                <button class="btn-secondary" onclick="triggerGallery()"><i class="ph-bold ph-image"></i> <span data-i18n="btn_gallery">Pick from Gallery</span></button>
            </div>
            <input type="file" id="gallery-input" accept="image/*" style="display: none;" onchange="uploadImage(event)">
        </div>
    </div>

    <div id="tab-history" class="screen">
        <h2 data-i18n="history">My History</h2>
        <div id="history-list"></div>
    </div>

    <div id="tab-calendar" class="screen">
        <h2 data-i18n="calendar">My Calendar</h2>
        <div class="card">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)"><i class="ph-bold ph-caret-left"></i></button>
                <span id="calendar-month-year">...</span>
                <button onclick="changeMonth(1)"><i class="ph-bold ph-caret-right"></i></button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div id="selected-day-details"></div>
    </div>

    <div id="tab-profile" class="screen">
        <h2 data-i18n="profile">My Profile</h2>
        <div class="card">
            <div style="text-align: center; margin-bottom: 25px;">
                <img id="profile-avatar" src="" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: rgba(255,255,255,0.5); display: none; margin: 0 auto; border: 4px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                <h3 id="profile-name" style="margin: 12px 0 0 0; font-size: 20px; color: var(--text-dark);"></h3>
            </div>

            <div class="lang-slider-wrapper">
                <div class="lang-slider-title" data-i18n="lbl_lang">Language / Язык</div>
                <div class="lang-toggle" id="langToggle" data-active="en">
                    <div class="lang-toggle-thumb"></div>
                    <button class="lang-btn" data-lang="en">🇬🇧</button>
                    <button class="lang-btn" data-lang="ru">🇷🇺</button>
                    <button class="lang-btn" data-lang="es">🇪🇸</button>
                    <button class="lang-btn" data-lang="zh">🇨🇳</button>
                </div>
            </div>

            <div class="form-group"><label data-i18n="lbl_gender">Gender</label><select id="gender"><option value="male" data-i18n="gen_m">Male</option><option value="female" data-i18n="gen_f">Female</option></select></div>
            <div class="form-group"><label data-i18n="lbl_age">Age (years)</label><input type="number" id="age" value="25"></div>
            <div class="form-group"><label data-i18n="lbl_height">Height (cm)</label><input type="number" id="height" value="180"></div>
            <div class="form-group"><label data-i18n="lbl_weight">Weight (kg)</label><input type="number" id="weight" value="75"></div>
            <div class="form-group"><label data-i18n="lbl_activity">Activity Level</label><select id="activity"><option value="1.2" data-i18n="act_1">Minimal</option><option value="1.375" data-i18n="act_2">Light</option><option value="1.55" selected data-i18n="act_3">Moderate</option><option value="1.725" data-i18n="act_4">High</option></select></div>
            <div class="form-group">
                <label data-i18n="lbl_goal">Goal</label>
                <select id="goal">
                    <option value="lose" data-i18n="goal_1">Lose weight (-20%)</option>
                    <option value="maintain" selected data-i18n="goal_2">Maintain weight</option>
                    <option value="gain" data-i18n="goal_3">Gain mass (+15%)</option>
                </select>
            </div>
            <button class="btn-primary" onclick="calculateAndSaveKcal()" style="margin-top: 25px;"><span data-i18n="btn_save_prof">Save Settings</span></button>
            <p id="profile-saved-msg" style="color: var(--macro-protein); font-weight: 600; text-align: center; display: none; margin-top: 15px;"><i class="ph-bold ph-check-circle"></i> <span data-i18n="saved_ok">Successfully updated!</span></p>
        </div>
    </div>

    <div id="sandbox-screen" class="screen">
        <h2 style="text-align: center;" data-i18n="ai_analysis">Neuro-Analysis</h2>
        <div class="card">
            <h3 id="food-name" style="text-align: center; margin-top: 0; font-weight: 600;">...</h3>
            <h1 id="food-cal" style="text-align: center; margin: 15px 0; color: var(--macro-cal); font-size: 42px;">0 kcal</h1>
            <div style="display: flex; justify-content: space-between; margin: 25px 0; font-weight: 600; font-size: 15px; color: var(--text-dark); background: rgba(255,255,255,0.6); padding: 18px; border-radius: 20px;">
                <span id="sandbox-p">P: 0</span><span id="sandbox-f">F: 0</span><span id="sandbox-c">C: 0</span>
            </div>
            <div style="background: rgba(255, 59, 48, 0.1); color: var(--accent-red); padding: 16px; border-radius: 16px; margin-bottom: 25px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px;">
                <i class="ph-fill ph-warning-circle" style="font-size: 22px;"></i> <span><span data-i18n="allergens">Allergens:</span> <strong id="food-allergens">-</strong></span>
            </div>
            <div class="buttons-column">
                <button id="save-food-btn" class="btn-primary" onclick="saveRealFood()"><span data-i18n="btn_save_food">Save to Diary</span></button>
                <button class="btn-secondary" onclick="cancelFood()"><span data-i18n="btn_cancel">Cancel</span></button>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display: none;">
        <div class="nav-item active" onclick="switchTab('diary-summary')"><i class="ph-fill ph-house nav-icon"></i><span data-i18n="nav_home">Home</span></div>
        <div class="nav-item" onclick="switchTab('history')"><i class="ph-fill ph-clock-counter-clockwise nav-icon"></i><span data-i18n="nav_history">History</span></div>
        <div class="nav-item" onclick="switchTab('calendar')"><i class="ph-fill ph-calendar-check nav-icon"></i><span data-i18n="nav_calendar">Calendar</span></div>
        <div class="nav-item" onclick="switchTab('profile')"><i class="ph-fill ph-user nav-icon"></i><span data-i18n="nav_profile">Profile</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        // ВЫНОСИМ IP СЕРВЕРА В ОДНО МЕСТО
        const API_BASE_URL = 'https://64.188.61.46.nip.io';
        
        // I18N DICTIONARY
        const i18n = {
            en: {
                sync: "Syncing...", consumed: "CONSUMED", over: "OVER LIMIT", out_of: "of", kcal: "kcal",
                protein: "Protein", fats: "Fats", carbs: "Carbs", water_title: "Water (250 ml)",
                water_drank: "Drank: {c} / 8 glasses ({l} L)", placeholder: "What did you eat?",
                btn_photo: "Snap a photo (tap 📎)", btn_gallery: "Pick from Gallery",
                history: "My History", empty_history: "Nothing eaten yet",
                calendar: "My Calendar", details: "Food Details", nothing_logged: "Nothing logged", today: "(Today)", no_data: "No data for this day",
                profile: "My Profile", lbl_lang: "Language", lbl_gender: "Gender", gen_m: "Male", gen_f: "Female",
                lbl_age: "Age (years)", lbl_height: "Height (cm)", lbl_weight: "Weight (kg)",
                lbl_activity: "Activity Level", act_1: "Minimal", act_2: "Light", act_3: "Moderate", act_4: "High",
                lbl_goal: "Goal", goal_1: "Lose weight (-20%)", goal_2: "Maintain weight", goal_3: "Gain mass (+15%)",
                btn_save_prof: "Save Settings", saved_ok: "Successfully updated!", saving: "Saving...",

        async function changeLanguage(langCode) {
            currLang = langCode;
            await saveToCloud('userLang', langCode);
            applyTranslations();
            
            // Отправляем сигнал боту, чтобы он тоже сменил язык в базе данных
            const userId = tg.initDataUnsafe?.user?.id;
            if (userId) {
                try {
                    await fetch(`${API_BASE_URL}/set_lang`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': tg.initData || '' // Передаем подпись для безопасности
                        },
                        body: JSON.stringify({ userId: userId, lang: langCode })
                    });
                } catch (err) {
                    console.log("Не удалось синхронизировать язык с ботом", err);

                changeLanguage(selectedLang);
            });

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('name')) {
            aiName = urlParams.get('name'); aiCal = parseInt(urlParams.get('cal')) || 0;
            aiP = parseInt(urlParams.get('p')) || 0; aiF = parseInt(urlParams.get('f')) || 0;
            aiC = parseInt(urlParams.get('c')) || 0; aiAl = urlParams.get('al') || '-'; aiEmoji = urlParams.get('em') || '🍽';
        }

        function saveToCloud(key, value) { return new Promise((resolve) => tg.CloudStorage.setItem(key, value, () => resolve(true))); }
        function getFromCloud(key) { return new Promise((resolve) => tg.CloudStorage.getItem(key, (err, val) => resolve(val))); }
        function getFormattedDate(dateObj) {
    const d = String(dateObj.getDate()).padStart(2, '0');
    const m = String(dateObj.getMonth() + 1).padStart(2, '0');
    const y = dateObj.getFullYear();
    return `${d}.${m}.${y}`;
}
        function getTodayDate() { return getFormattedDate(new Date()); }

        window.onload = async function() {
            document.getElementById('loading-screen').style.display = 'block';

            let urlLang = urlParams.get('lang'); 
            let savedLang = await getFromCloud('userLang');

            if (urlLang && i18n[urlLang]) {
                currLang = urlLang;
                await saveToCloud('userLang', currLang); 
            } else if (savedLang) { 
                currLang = savedLang; 
            } else if (tg.initDataUnsafe?.user?.language_code && i18n[tg.initDataUnsafe.user.language_code]) {
                currLang = tg.initDataUnsafe.user.language_code;
            }
            
            applyTranslations(); 

            const user = tg.initDataUnsafe?.user;
            if (user) {
                if (user.photo_url) {
                    const avatar = document.getElementById('profile-avatar');
                    avatar.src = user.photo_url; avatar.style.display = 'block';
                }
                document.getElementById('profile-name').innerText = user.first_name || t('profile');
            }

            const userMacrosStr = await getFromCloud('userMacros');
            let consumedTodayStr = await getFromCloud('consumedToday');
            let consumedItemsStr = await getFromCloud('consumedItems');
            let historyLogStr = await getFromCloud('historyLog');
            let lastDateStr = await getFromCloud('lastDate');
            let waterHistoryStr = await getFromCloud('water_history');
            
            window.waterHistory = waterHistoryStr ? JSON.parse(waterHistoryStr) : {};
            const today = getTodayDate();
            window.historyLog = historyLogStr ? JSON.parse(historyLogStr) : {};

            if (lastDateStr && lastDateStr !== today && userMacrosStr) {
                window.historyLog[lastDateStr] = { consumed: consumedTodayStr ? JSON.parse(consumedTodayStr) : { cal: 0, protein: 0, fat: 0, carbs: 0 }, target: JSON.parse(userMacrosStr), items: consumedItemsStr ? JSON.parse(consumedItemsStr) : [] };
                await saveToCloud('historyLog', JSON.stringify(window.historyLog));
                consumedTodayStr = JSON.stringify({ cal: 0, protein: 0, fat: 0, carbs: 0 }); consumedItemsStr = JSON.stringify([]);
                await saveToCloud('consumedToday', consumedTodayStr); await saveToCloud('consumedItems', consumedItemsStr); await saveToCloud('lastDate', today);
            } else if (!lastDateStr) { await saveToCloud('lastDate', today); }

            window.userMacros = userMacrosStr ? JSON.parse(userMacrosStr) : null;
            window.consumedToday = consumedTodayStr ? JSON.parse(consumedTodayStr) : { cal: 0, protein: 0, fat: 0, carbs: 0 };
            window.consumedItems = consumedItemsStr ? JSON.parse(consumedItemsStr) : [];

            document.getElementById('loading-screen').style.display = 'none';

            if (window.userMacros) { 
                document.getElementById('bottom-nav').style.display = 'flex'; 
                if (aiName && aiCal > 0) { renderSandbox(); } else { switchTab('diary-summary'); updateDashboard(); } 
            } else { switchTab('profile'); }
            
            updateWaterUI(window.waterHistory[today] || 0);
            
            // Сохраняем дату запуска приложения
            window.currentAppDate = getTodayDate();
        };

        function switchTab(tabName) {
            // Если день сменился — принудительно перезагружаем апп для архивации истории
            if (window.currentAppDate && window.currentAppDate !== getTodayDate()) {
                window.location.reload();
                return;
            }

            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active-screen');
            
            if(document.getElementById('bottom-nav').style.display !== 'none') {
                const navItems = document.querySelectorAll('.nav-item');
                if(tabName === 'diary-summary') navItems[0].classList.add('active');
                if(tabName === 'history') { navItems[1].classList.add('active'); renderHistoryList(); }
                if(tabName === 'calendar') { navItems[2].classList.add('active'); renderCalendar(); renderSelectedDay(); }
                if(tabName === 'profile') navItems[3].classList.add('active');
            }
        }

        async function calculateAndSaveKcal() {
            const btn = document.querySelector('#tab-profile .btn-primary');
            btn.innerHTML = t('saving'); btn.disabled = true;

            const age = parseInt(document.getElementById('age').value); const height = parseInt(document.getElementById('height').value);
            const weight = parseInt(document.getElementById('weight').value); const activity = parseFloat(document.getElementById('activity').value);
            const gender = document.getElementById('gender').value; const goal = document.getElementById('goal').value;

            let bmr = gender === 'male' ? (10 * weight) + (6.25 * height) - (5 * age) + 5 : (10 * weight) + (6.25 * height) - (5 * age) - 161;
            let tdee = Math.round(bmr * activity);
            
            if (goal === 'lose') { tdee = Math.round(tdee * 0.80); } else if (goal === 'gain') { tdee = Math.round(tdee * 1.15); }
            
            window.userMacros = { cal: tdee, protein: Math.round((tdee * 0.3) / 4), fat: Math.round((tdee * 0.3) / 9), carbs: Math.round((tdee * 0.4) / 4) };
            await saveToCloud('userMacros', JSON.stringify(window.userMacros));
            
            if(!window.consumedToday) {
                window.consumedToday = { cal: 0, protein: 0, fat: 0, carbs: 0 }; window.consumedItems = [];
                await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems));
                await saveToCloud('lastDate', getTodayDate()); document.getElementById('bottom-nav').style.display = 'flex';
            }

            btn.innerHTML = t('btn_save_prof'); btn.disabled = false;
            const msg = document.getElementById('profile-saved-msg'); msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; switchTab('diary-summary'); updateDashboard(); }, 1000);
        }

        function setRingProgress(id, current, max, radius) {
            const circle = document.getElementById(id);
            if(!circle) return;
            const circ = 2 * Math.PI * radius;
            circle.style.strokeDasharray = `${circ} ${circ}`;
            const pct = max > 0 ? Math.min(Math.max(current / max, 0), 1) : 0;
            setTimeout(() => { circle.style.strokeDashoffset = circ - (pct * circ); }, 50);
        }

        function updateDashboard() {
            const target = window.userMacros; const consumed = window.consumedToday;

            document.getElementById('cal-consumed').innerText = consumed.cal;
            document.getElementById('cal-target').innerText = target.cal;
            
            if (consumed.cal > target.cal) {
                document.getElementById('main-cal-title').innerText = t('over');
                document.getElementById('main-cal-title').style.color = "var(--accent-red)";
                document.getElementById('cal-consumed').style.color = "var(--accent-red)";
            } else {
                document.getElementById('main-cal-title').innerText = t('consumed');
                document.getElementById('main-cal-title').style.color = "var(--text-gray)";
                document.getElementById('cal-consumed').style.color = "var(--text-dark)";
            }
            
            document.getElementById('protein-text').innerText = `${consumed.protein} / ${target.protein}`;
            document.getElementById('fat-text').innerText = `${consumed.fat} / ${target.fat}`;
            document.getElementById('carbs-text').innerText = `${consumed.carbs} / ${target.carbs}`;

            setRingProgress('svg-cal', consumed.cal, target.cal, 85);
            setRingProgress('svg-protein', consumed.protein, target.protein, 26);
            setRingProgress('svg-fat', consumed.fat, target.fat, 26);
            setRingProgress('svg-carbs', consumed.carbs, target.carbs, 26);
        }

        function renderHistoryList() {
            const listContainer = document.getElementById('history-list'); listContainer.innerHTML = ''; 

            if (window.consumedItems.length === 0) {
                listContainer.innerHTML = `<div style="text-align: center; color: var(--text-gray); padding: 50px 0;"><i class="ph-fill ph-bowl-food" style="font-size: 56px; margin-bottom: 10px; color: rgba(0,0,0,0.1);"></i><br>${t('empty_history')}</div>`; return;

            [...window.consumedItems].reverse().forEach(item => {
                const div = document.createElement('div'); div.className = 'history-item';

                    <button class="delete-btn" onclick="deleteFood(${item.id})"><i class="ph-bold ph-trash"></i></button>
                `;
                listContainer.appendChild(div);

        async function deleteFood(id) {
            const index = window.consumedItems.findIndex(i => i.id === id);
            if (index > -1) {
                const item = window.consumedItems[index];
                window.consumedToday.cal -= item.cal; window.consumedToday.protein -= item.p; window.consumedToday.fat -= item.f; window.consumedToday.carbs -= item.c;
                window.consumedItems.splice(index, 1);
                await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems));
                renderHistoryList(); updateDashboard();
            }
        }

        let currentMonth = new Date().getMonth(); let currentYear = new Date().getFullYear(); let selectedDateStr = getTodayDate();

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); const monthYearText = document.getElementById('calendar-month-year'); grid.innerHTML = '';
            monthYearText.innerText = `${t('months')[currentMonth]} ${currentYear}`;
            
            t('days').forEach(d => { const el = document.createElement('div'); el.className = 'calendar-day-name'; el.innerText = d; grid.appendChild(el); });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); let emptyDays = firstDay === 0 ? 6 : firstDay - 1;
            for(let i = 0; i < emptyDays; i++) { const el = document.createElement('div'); el.className = 'calendar-day empty'; grid.appendChild(el); }

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate(); const waterHistory = window.waterHistory;

            for(let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(currentYear, currentMonth, d); const dateStr = getFormattedDate(dateObj);
                const el = document.createElement('div'); el.className = 'calendar-day'; el.innerText = d;

                if(window.historyLog[dateStr] || waterHistory[dateStr] || dateStr === getTodayDate()) { el.classList.add('has-data'); }
                if(dateStr === selectedDateStr) el.classList.add('selected');

                el.onclick = () => { selectedDateStr = dateStr; renderCalendar(); renderSelectedDay(); };
                grid.appendChild(el);
            }
        }

        function changeMonth(dir) {

            renderCalendar();
        }

        async function uploadImage(event) {
            const file = event.target.files[0]; 
            if (!file) return;
            
            showLoader(t('load_prep')); 

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height = Math.round((height * MAX_WIDTH) / width); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData(); formData.append('image', blob, 'image.jpg'); 
                        showLoader(t('load_ai'));
                        await sendToNgrok('/upload', formData, false);
                    }, 'image/jpeg', 0.8);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file); event.target.value = ''; 
        }

        async function sendTextToAI() {
            const textInput = document.getElementById('text-food-input').value; if(!textInput) return;
            showLoader(t('load_calc')); await sendToNgrok('/text', JSON.stringify({ text: textInput, lang: currLang }), true);
            document.getElementById('text-food-input').value = '';
        }

        async function sendToNgrok(endpoint, bodyData, isJson) {
            try {
                let finalEndpoint = endpoint + '?lang=' + currLang;
                const options = { 
                    method: 'POST', 
                    body: bodyData,
                    headers: { 'Authorization': tg.initData || '' } // Передаем подпись
                }; 
                if(isJson) options.headers['Content-Type'] = 'application/json';
                
                const response = await fetch(API_BASE_URL + finalEndpoint, options);
                if (response.status === 429) throw new Error('Слишком много запросов. Подождите минуту.');
                if (response.status === 401) throw new Error('Ошибка безопасности Telegram.');
                if (!response.ok) throw new Error('Ошибка связи');
                
                const data = await response.json(); if (data.error) throw new Error(data.error);
                aiName = data.name; aiCal = parseInt(data.cal); aiP = parseInt(data.protein); aiF = parseInt(data.fat); aiC = parseInt(data.carbs); aiAl = data.allergens || '-'; aiEmoji = data.emoji || '🍽';
                renderSandbox();
            } catch (err) { 
                tg.showAlert(err.message || t('error_ai')); 
                document.getElementById('loading-screen').style.display = 'none'; 
            }
        }

        function showLoader(msg) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('loader-message').innerHTML = `<i class="ph-bold ph-spinner-gap ph-spin" style="font-size: 40px; display:block; margin-bottom: 15px; color: var(--macro-protein);"></i><span>${msg}</span>`;
            document.getElementById('loading-screen').style.display = 'block';
        }

        function renderSandbox() {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById('loading-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('food-name').innerText = `${aiEmoji} ${aiName}`; document.getElementById('food-cal').innerText = aiCal + ` ${t('kcal')}`;
            document.getElementById('sandbox-p').innerText = `P: ${aiP} g`; document.getElementById('sandbox-f').innerText = `F: ${aiF} g`; document.getElementById('sandbox-c').innerText = `C: ${aiC} g`;
            document.getElementById('food-allergens').innerText = aiAl; document.getElementById('sandbox-screen').style.display = 'block';
        }

        async function saveRealFood() {
            // Защита от сохранения в старый день
            if (window.currentAppDate && window.currentAppDate !== getTodayDate()) {
                window.location.reload();
                return;
            }

            const btn = document.getElementById('save-food-btn'); btn.innerHTML = t('saving'); btn.disabled = true;
            window.consumedToday.cal += aiCal; window.consumedToday.protein += aiP; window.consumedToday.fat += aiF; window.consumedToday.carbs += aiC;
            window.consumedItems.push({ id: Date.now(), name: aiName, cal: aiCal, p: aiP, f: aiF, c: aiC, al: aiAl, em: aiEmoji });
            
            await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems)); await saveToCloud('lastDate', getTodayDate());
            
            btn.innerHTML = `<span data-i18n="btn_save_food">${t('btn_save_food')}</span>`; btn.disabled = false; window.history.replaceState({}, document.title, window.location.pathname);
            document.getElementById('sandbox-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'flex'; switchTab('diary-summary'); updateDashboard();

            if (typeof confetti === 'function') { confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#007AFF', '#34C759', '#8A2BE2', '#FF4500'] }); }
        }

        function cancelFood() { window.history.replaceState({}, document.title, window.location.pathname); document.getElementById('sandbox-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'flex'; switchTab('diary-summary'); }

        const waterGlasses = document.querySelectorAll('.glass'); const waterText = document.getElementById('water-text');

        function updateWaterUI(count) {
            waterGlasses.forEach((glass, index) => { if (index < count) { glass.classList.add('filled'); } else { glass.classList.remove('filled'); } });
            let liters = (count * 0.25).toFixed(2); waterText.innerText = t('water_drank').replace('{c}', count).replace('{l}', liters);
        }

        waterGlasses.forEach(glass => {
            glass.addEventListener('click', async function(e) {
                let clickedIndex = parseInt(this.getAttribute('data-index')); const today = getTodayDate(); let currentWater = window.waterHistory[today] || 0;
                let isAdding = true;

                if (clickedIndex === currentWater) { window.waterHistory[today] = currentWater - 1; isAdding = false; } 
                else { window.waterHistory[today] = clickedIndex; }
                
                updateWaterUI(window.waterHistory[today]);

                if (isAdding && typeof confetti === 'function') {
                    const rect = this.getBoundingClientRect();
                    const x = (rect.left + rect.width / 2) / window.innerWidth; const y = (rect.top + rect.height / 2) / window.innerHeight;
                    confetti({ particleCount: 20, spread: 50, startVelocity: 15, decay: 0.9, gravity: 1.2, colors: ['#007AFF', '#4DA8DA', '#8EC5FC', '#FFFFFF'], shapes: ['circle'], origin: { x, y }, zIndex: 2000, disableForReducedMotion: true, scalar: 0.4 });
                }

                await saveToCloud('water_history', JSON.stringify(window.waterHistory));
                if (document.getElementById('tab-calendar').classList.contains('active-screen')) { renderSelectedDay(); }
            });
        });
    </script>
</body>
