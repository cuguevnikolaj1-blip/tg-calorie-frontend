<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Food Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-light: #FFFFFF;
            --card-dark: #1C1C1E;
            --text-dark: #1C1C1E;
            --text-light: #FFFFFF;
            --text-gray: #8E8E93;
            --accent-blue: #007AFF;
            --accent-green: #34C759;
            --accent-orange: #FF9500;
            --accent-red: #FF3B30;
            --radius: 24px;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 149, 0, 0.08) 0px, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(0, 199, 190, 0.12) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark); 
            margin: 0; padding: 20px 20px 100px 20px; box-sizing: border-box; 
        }

        h2 { text-align: left; font-size: 22px; font-weight: 700; margin-bottom: 20px; margin-top: 10px; }
        
        .card { background: var(--card-light); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-gray); font-weight: 500; }
        input[type="number"], input[type="text"], select { width: 100%; padding: 14px; border-radius: 16px; border: 1px solid #E5E5EA; box-sizing: border-box; font-size: 16px; background: #F2F2F7; color: var(--text-dark); font-family: 'Poppins', sans-serif; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent-blue); background: #fff; }
        
        button { background-color: var(--card-dark); color: var(--text-light); border: none; padding: 16px; border-radius: 16px; width: 100%; cursor: pointer; font-weight: 600; font-size: 16px; font-family: 'Poppins', sans-serif; transition: 0.2s; }
        button:active { transform: scale(0.97); }
        .btn-blue { background-color: var(--accent-blue); }
        .btn-green { background-color: var(--accent-green); }
        .btn-secondary { background-color: #E5E5EA; color: var(--text-dark); margin-top: 10px; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loading-screen, #sandbox-screen { display: none; }

        /* НОВЫЕ СТИЛЬНЫЕ SVG-КОЛЬЦА ПРОГРЕССА */
        .svg-circle-wrap { position: relative; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .main-circle { width: 180px; height: 180px; margin-bottom: 25px; }
        .macro-circle { width: 85px; height: 85px; }
        
        svg { width: 100%; height: 100%; transform: rotate(-90deg); overflow: visible; }
        circle { fill: none; stroke-linecap: round; }
        .bg-circle { stroke: #F2F2F7; }
        .progress-circle { transition: stroke-dashoffset 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        .main-circle circle { stroke-width: 8; }
        .macro-circle circle { stroke-width: 8; }

        .circle-inner-text { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .main-circle-title { font-size: 13px; color: #8E8E93; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;}
        .main-circle-value { font-size: 34px; font-weight: 700; margin: 2px 0; color: var(--text-dark); }
        
        .macros-row { display: flex; justify-content: space-between; }
        .macro-name { font-size: 11px; color: var(--text-gray); font-weight: 600; margin-top: 2px;}
        .macro-value { font-size: 14px; font-weight: 700; color: var(--text-dark); }

        /* Вода */
        .water-header { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; color: var(--accent-blue); font-weight: 600; font-size: 18px; }
        .glasses { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .glass { font-size: 28px; cursor: pointer; color: #E5E5EA; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass.filled { color: var(--accent-blue); transform: scale(1.15); }
        #water-text { color: var(--text-gray); font-size: 13px; margin: 0; font-weight: 500; text-align: center; }

        /* Ввод еды */
        .input-row { display: flex; gap: 10px; }
        .input-row input { flex: 1; margin: 0; }
        .input-row button { width: auto; padding: 0 20px; }
        .buttons-row { display: flex; gap: 10px; margin-top: 10px; }
        .buttons-row button { display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* История */
        .history-item { background: #F9F9FB; padding: 16px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #F0F0F5; }
        .history-emoji { font-size: 32px; margin-right: 15px; background: #fff; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .history-info { flex: 1; }
        .history-info h4 { margin: 0 0 4px 0; font-size: 15px; font-weight: 600; }
        .history-info p { margin: 0; font-size: 12px; color: var(--text-gray); font-weight: 500;}
        .delete-btn { background: #FFF0F0; color: var(--accent-red); width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-left: 10px; flex-shrink: 0; padding: 0; }

        /* Календарь */
        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: 600; margin-bottom: 15px; font-size: 16px; }
        .calendar-header button { width: 36px; height: 36px; padding: 0; background: #F2F2F7; color: var(--text-dark); border-radius: 12px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; text-align: center; }
        .calendar-day-name { font-size: 11px; color: var(--text-gray); margin-bottom: 5px; font-weight: 600; text-transform: uppercase; }
        .calendar-day { padding: 12px 0; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.2s; background: transparent; }
        .calendar-day.empty { cursor: default; }
        .calendar-day.has-data { background: #E3F2FD; color: var(--accent-blue); font-weight: 600; }
        .calendar-day.selected { background: var(--accent-blue); color: #fff; font-weight: 600; box-shadow: 0 4px 12px rgba(0,122,255,0.3); }

        details { width: 100%; }
        summary { font-size: 14px; color: var(--accent-blue); cursor: pointer; font-weight: 600; outline: none; margin-top: 15px; list-style: none; display: flex; align-items: center; gap: 5px; }
        summary::-webkit-details-marker { display: none; }

        /* Плавающее меню */
        .bottom-nav { 
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background-color: var(--card-dark); border-radius: 30px; 
            display: flex; justify-content: space-around; padding: 15px 10px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.25); z-index: 1000; 
        }
        .nav-item { text-align: center; color: #636366; font-size: 10px; font-weight: 600; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item.active { color: var(--text-light); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; transition: 0.3s; }
        .nav-item.active .nav-icon { transform: translateY(-2px); text-shadow: 0 0 15px rgba(255,255,255,0.4); }
        
        .loader-text { text-align: center; font-size: 18px; margin-top: 40vh; font-weight: 600; color: var(--text-gray); }
    </style>
</head>
<body>

    <div id="loading-screen"><div class="loader-text" id="loader-message"><i class="ph ph-spinner-gap ph-spin" style="font-size: 32px; display:block; margin-bottom: 10px; color: #1C1C1E;"></i>Синхронизация...</div></div>

    <div id="tab-home" class="screen">
        <h2>Сводка сегодня</h2>
        
        <div class="card" style="text-align: center;">
            <div class="svg-circle-wrap main-circle">
                <svg viewBox="0 0 100 100">
                    <circle class="bg-circle" cx="50" cy="50" r="44"></circle>
                    <circle class="progress-circle" id="svg-cal" cx="50" cy="50" r="44"></circle>
                </svg>
                <div class="circle-inner-text">
                    <span class="main-circle-title">ОСТАЛОСЬ</span>
                    <span class="main-circle-value" id="cal-left">0</span>
                    <span class="main-circle-title" style="text-transform: none; color: #8E8E93;">из <span id="cal-target">0</span> ккал</span>
                </div>
            </div>
            
            <div class="macros-row">
                <div class="svg-circle-wrap macro-circle">
                    <svg viewBox="0 0 100 100">
                        <circle class="bg-circle" cx="50" cy="50" r="40"></circle>
                        <circle class="progress-circle" id="svg-protein" cx="50" cy="50" r="40"></circle>
                    </svg>
                    <div class="circle-inner-text">
                        <span class="macro-value" id="protein-text">0/0</span>
                        <span class="macro-name">Белки</span>
                    </div>
                </div>
                <div class="svg-circle-wrap macro-circle">
                    <svg viewBox="0 0 100 100">
                        <circle class="bg-circle" cx="50" cy="50" r="40"></circle>
                        <circle class="progress-circle" id="svg-fat" cx="50" cy="50" r="40"></circle>
                    </svg>
                    <div class="circle-inner-text">
                        <span class="macro-value" id="fat-text">0/0</span>
                        <span class="macro-name">Жиры</span>
                    </div>
                </div>
                <div class="svg-circle-wrap macro-circle">
                    <svg viewBox="0 0 100 100">
                        <circle class="bg-circle" cx="50" cy="50" r="40"></circle>
                        <circle class="progress-circle" id="svg-carbs" cx="50" cy="50" r="40"></circle>
                    </svg>
                    <div class="circle-inner-text">
                        <span class="macro-value" id="carbs-text">0/0</span>
                        <span class="macro-name">Угл.</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="water-header"><i class="ph-fill ph-drop"></i> Трекер воды (250 мл)</div>
            <div class="glasses" id="water-glasses">
                <div class="glass" data-index="1"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="2"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="3"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="4"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="5"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="6"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="7"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="8"><i class="ph-fill ph-drop"></i></div>
            </div>
            <p id="water-text">Выпито: 0 / 8 стаканов (0.00 л)</p>
        </div>
        
        <div class="card">
            <div class="input-row">
                <input type="text" id="text-food-input" placeholder="Напиши, что съел...">
                <button class="btn-blue" onclick="sendTextToAI()"><i class="ph-bold ph-paper-plane-right" style="font-size: 20px;"></i></button>
            </div>
            <div class="buttons-row">
                <button class="btn-green" onclick="triggerDirectCamera()"><i class="ph-bold ph-camera"></i> Сфотографировать</button>
                <button class="btn-secondary" style="margin: 0;" onclick="triggerGallery()"><i class="ph-bold ph-image"></i> Галерея</button>
            </div>
            <input type="file" id="direct-camera-input" accept="image/*" capture="environment" style="display: none;" onchange="uploadImage(event)">
            <input type="file" id="gallery-input" accept="image/*" style="display: none;" onchange="uploadImage(event)">
        </div>
    </div>

    <div id="tab-diary" class="screen">
        <h2>Мой рацион</h2>
        <div class="card" style="background: transparent; box-shadow: none; padding: 0;">
            <div id="history-list"></div>
        </div>
    </div>

    <div id="tab-progress" class="screen">
        <h2>Аналитика</h2>
        <div class="card calendar-wrap">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)"><i class="ph-bold ph-caret-left"></i></button>
                <span id="calendar-month-year">...</span>
                <button onclick="changeMonth(1)"><i class="ph-bold ph-caret-right"></i></button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div id="selected-day-details" style="margin-top: 15px;"></div>
    </div>

    <div id="tab-profile" class="screen">
        <h2>Настройки тела</h2>
        <div class="card">
            <div class="form-group"><label>Пол</label><select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
            <div class="form-group"><label>Возраст (лет)</label><input type="number" id="age" value="25"></div>
            <div class="form-group"><label>Рост (см)</label><input type="number" id="height" value="180"></div>
            <div class="form-group"><label>Вес (кг)</label><input type="number" id="weight" value="75"></div>
            <div class="form-group"><label>Активность</label><select id="activity"><option value="1.2">Минимальная</option><option value="1.375">Слабая</option><option value="1.55" selected>Средняя</option><option value="1.725">Высокая</option></select></div>
            <div class="form-group">
                <label>Моя цель</label>
                <select id="goal">
                    <option value="lose">Сбросить вес (-20%)</option>
                    <option value="maintain" selected>Поддержание нормы</option>
                    <option value="gain">Набор массы (+15%)</option>
                </select>
            </div>
            <button class="btn-blue" onclick="calculateAndSaveKcal()" style="margin-top: 10px;">Сохранить параметры</button>
            <p id="profile-saved-msg" style="color: var(--accent-green); font-weight: 600; text-align: center; display: none; margin-top: 15px;"><i class="ph-bold ph-check-circle"></i> Успешно обновлено!</p>
        </div>
    </div>

    <div id="sandbox-screen">
        <h2 style="text-align: center;">Распознано ИИ</h2>
        <div class="card">
            <h3 id="food-name" style="text-align: center; margin-top: 0; font-weight: 600;">Загрузка...</h3>
            <h1 id="food-cal" style="text-align: center; margin: 15px 0; color: var(--accent-blue); font-size: 36px;">0 ккал</h1>
            <div style="display: flex; justify-content: space-between; margin: 20px 0; font-weight: 600; font-size: 14px; color: var(--text-dark); background: #F2F2F7; padding: 15px; border-radius: 16px;">
                <span id="sandbox-p">Б: 0</span><span id="sandbox-f">Ж: 0</span><span id="sandbox-c">У: 0</span>
            </div>
            <div style="background: #FFF0F0; color: var(--accent-red); padding: 12px 15px; border-radius: 12px; margin-bottom: 20px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px;">
                <i class="ph-fill ph-warning-circle" style="font-size: 18px;"></i> <span>Аллергены: <strong id="food-allergens">Нет</strong></span>
            </div>
            <button id="save-food-btn" class="btn-blue" onclick="saveRealFood()">Записать в дневник</button>
            <button class="btn-secondary" onclick="cancelFood()">Отменить</button>
        </div>
    </div>

    <div class="bottom-nav" id="bottom-nav" style="display: none;">
        <div class="nav-item active" onclick="switchTab('home')"><i class="ph-fill ph-house nav-icon"></i>Главная</div>
        <div class="nav-item" onclick="switchTab('diary')"><i class="ph-fill ph-book-bookmark nav-icon"></i>Дневник</div>
        <div class="nav-item" onclick="switchTab('progress')"><i class="ph-fill ph-chart-line-up nav-icon"></i>Аналитика</div>
        <div class="nav-item" onclick="switchTab('profile')"><i class="ph-fill ph-user nav-icon"></i>Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        window.userMacros = null; window.consumedToday = null; window.consumedItems = [];
        window.historyLog = {}; window.waterHistory = {}; 

        let aiName = '', aiCal = 0, aiP = 0, aiF = 0, aiC = 0, aiAl = 'Нет', aiEmoji = '🍽';

        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.get('name')) {
            aiName = urlParams.get('name'); aiCal = parseInt(urlParams.get('cal')) || 0;
            aiP = parseInt(urlParams.get('p')) || 0; aiF = parseInt(urlParams.get('f')) || 0;
            aiC = parseInt(urlParams.get('c')) || 0; aiAl = urlParams.get('al') || 'Нет'; aiEmoji = urlParams.get('em') || '🍽';
        }

        function saveToCloud(key, value) { return new Promise((resolve) => tg.CloudStorage.setItem(key, value, () => resolve(true))); }
        function getFromCloud(key) { return new Promise((resolve) => tg.CloudStorage.getItem(key, (err, val) => resolve(val))); }
        function getFormattedDate(dateObj) { return dateObj.toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit', year: 'numeric'}); }
        function getTodayDate() { return getFormattedDate(new Date()); }

        window.onload = async function() {
            document.getElementById('loading-screen').style.display = 'block';

            const userMacrosStr = await getFromCloud('userMacros');
            let consumedTodayStr = await getFromCloud('consumedToday');
            let consumedItemsStr = await getFromCloud('consumedItems');
            let historyLogStr = await getFromCloud('historyLog');
            let lastDateStr = await getFromCloud('lastDate');
            let waterHistoryStr = await getFromCloud('water_history');
            
            window.waterHistory = waterHistoryStr ? JSON.parse(waterHistoryStr) : {};
            const today = getTodayDate();
            window.historyLog = historyLogStr ? JSON.parse(historyLogStr) : {};

            if (lastDateStr && lastDateStr !== today && userMacrosStr) {
                window.historyLog[lastDateStr] = { consumed: consumedTodayStr ? JSON.parse(consumedTodayStr) : { cal: 0, protein: 0, fat: 0, carbs: 0 }, target: JSON.parse(userMacrosStr), items: consumedItemsStr ? JSON.parse(consumedItemsStr) : [] };
                await saveToCloud('historyLog', JSON.stringify(window.historyLog));
                consumedTodayStr = JSON.stringify({ cal: 0, protein: 0, fat: 0, carbs: 0 }); consumedItemsStr = JSON.stringify([]);
                await saveToCloud('consumedToday', consumedTodayStr); await saveToCloud('consumedItems', consumedItemsStr); await saveToCloud('lastDate', today);
            } else if (!lastDateStr) { await saveToCloud('lastDate', today); }

            window.userMacros = userMacrosStr ? JSON.parse(userMacrosStr) : null;
            window.consumedToday = consumedTodayStr ? JSON.parse(consumedTodayStr) : { cal: 0, protein: 0, fat: 0, carbs: 0 };
            window.consumedItems = consumedItemsStr ? JSON.parse(consumedItemsStr) : [];

            document.getElementById('loading-screen').style.display = 'none';

            if (window.userMacros) { document.getElementById('bottom-nav').style.display = 'flex'; if (aiName && aiCal > 0) { renderSandbox(); } else { switchTab('home'); updateDashboard(); } } 
            else { switchTab('profile'); }
            loadWater();
        };

        function switchTab(tabName) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabName).classList.add('active-screen');
            
            if(document.getElementById('bottom-nav').style.display !== 'none') {
                const navItems = document.querySelectorAll('.nav-item');
                if(tabName === 'home') navItems[0].classList.add('active');
                if(tabName === 'diary') { navItems[1].classList.add('active'); renderHistoryList(); }
                if(tabName === 'progress') { navItems[2].classList.add('active'); renderCalendar(); renderSelectedDay(); }
                if(tabName === 'profile') navItems[3].classList.add('active');
            }
        }

        async function calculateAndSaveKcal() {
            const btn = document.querySelector('#tab-profile button');
            btn.innerText = "Сохраняем..."; btn.disabled = true;

            const age = parseInt(document.getElementById('age').value); const height = parseInt(document.getElementById('height').value);
            const weight = parseInt(document.getElementById('weight').value); const activity = parseFloat(document.getElementById('activity').value);
            const gender = document.getElementById('gender').value; const goal = document.getElementById('goal').value;

            let bmr = gender === 'male' ? (10 * weight) + (6.25 * height) - (5 * age) + 5 : (10 * weight) + (6.25 * height) - (5 * age) - 161;
            let tdee = Math.round(bmr * activity);
            
            if (goal === 'lose') { tdee = Math.round(tdee * 0.80); } else if (goal === 'gain') { tdee = Math.round(tdee * 1.15); }
            
            window.userMacros = { cal: tdee, protein: Math.round((tdee * 0.3) / 4), fat: Math.round((tdee * 0.3) / 9), carbs: Math.round((tdee * 0.4) / 4) };
            await saveToCloud('userMacros', JSON.stringify(window.userMacros));
            
            if(!window.consumedToday) {
                window.consumedToday = { cal: 0, protein: 0, fat: 0, carbs: 0 }; window.consumedItems = [];
                await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems));
                await saveToCloud('lastDate', getTodayDate()); document.getElementById('bottom-nav').style.display = 'flex';
            }

            btn.innerText = "Сохранить параметры"; btn.disabled = false;
            const msg = document.getElementById('profile-saved-msg'); msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; switchTab('home'); updateDashboard(); }, 1000);
        }

        function updateDashboard() {
            const target = window.userMacros; const consumed = window.consumedToday;

            document.getElementById('cal-left').innerText = Math.max(0, target.cal - consumed.cal);
            document.getElementById('cal-target').innerText = target.cal;
            document.getElementById('protein-text').innerText = `${Math.max(0, consumed.protein)}/${target.protein}`;
            document.getElementById('fat-text').innerText = `${Math.max(0, consumed.fat)}/${target.fat}`;
            document.getElementById('carbs-text').innerText = `${Math.max(0, consumed.carbs)}/${target.carbs}`;

            // Запускаем отрисовку SVG графиков
            setSvgProgress('svg-cal', consumed.cal, target.cal, '#007AFF');
            setSvgProgress('svg-protein', consumed.protein, target.protein, '#FF9500');
            setSvgProgress('svg-fat', consumed.fat, target.fat, '#FF3B30');
            setSvgProgress('svg-carbs', consumed.carbs, target.carbs, '#34C759');
        }

        // Логика SVG колец прогресса
        function setSvgProgress(id, current, max, color) {
            const circle = document.getElementById(id);
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.stroke = color;
            
            const percentage = Math.min(Math.max(current / max, 0), 1);
            const offset = circumference - percentage * circumference;
            
            // Маленькая задержка для красивой анимации при загрузке
            setTimeout(() => { circle.style.strokeDashoffset = offset; }, 100);
        }

        function renderHistoryList() {
            const listContainer = document.getElementById('history-list'); listContainer.innerHTML = ''; 

            if (window.consumedItems.length === 0) {
                listContainer.innerHTML = '<div style="text-align: center; color: var(--text-gray); padding: 40px 0;"><i class="ph-fill ph-bowl-food" style="font-size: 48px; margin-bottom: 10px; color: #D1D1D6;"></i><br>Пока ничего не съедено</div>'; return;
            }

            [...window.consumedItems].reverse().forEach(item => {
                const div = document.createElement('div'); div.className = 'history-item';
                div.innerHTML = `
                    <div class="history-emoji">${item.em || '🍽'}</div>
                    <div class="history-info">
                        <h4>${item.name}</h4>
                        <p>🔥 ${item.cal} ккал <span style="margin-left:5px; color:#c7c7cc;">•</span> Б:${item.p} Ж:${item.f} У:${item.c}</p>
                    </div>
                    <button class="delete-btn" onclick="deleteFood(${item.id})"><i class="ph-bold ph-x"></i></button>
                `;
                listContainer.appendChild(div);
            });
        }

        async function deleteFood(id) {
            const index = window.consumedItems.findIndex(i => i.id === id);
            if (index > -1) {
                const item = window.consumedItems[index];
                window.consumedToday.cal -= item.cal; window.consumedToday.protein -= item.p; window.consumedToday.fat -= item.f; window.consumedToday.carbs -= item.c;
                window.consumedItems.splice(index, 1);
                await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems));
                renderHistoryList(); updateDashboard();
            }
        }

        let currentMonth = new Date().getMonth(); let currentYear = new Date().getFullYear(); let selectedDateStr = getTodayDate();

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); const monthYearText = document.getElementById('calendar-month-year'); grid.innerHTML = '';
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            monthYearText.innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            const days = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс']; days.forEach(d => { const el = document.createElement('div'); el.className = 'calendar-day-name'; el.innerText = d; grid.appendChild(el); });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); let emptyDays = firstDay === 0 ? 6 : firstDay - 1;
            for(let i = 0; i < emptyDays; i++) { const el = document.createElement('div'); el.className = 'calendar-day empty'; grid.appendChild(el); }

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate(); const waterHistory = window.waterHistory;

            for(let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(currentYear, currentMonth, d); const dateStr = getFormattedDate(dateObj);
                const el = document.createElement('div'); el.className = 'calendar-day'; el.innerText = d;

                if(window.historyLog[dateStr] || waterHistory[dateStr] || dateStr === getTodayDate()) { el.classList.add('has-data'); }
                if(dateStr === selectedDateStr) el.classList.add('selected');

                el.onclick = () => { selectedDateStr = dateStr; renderCalendar(); renderSelectedDay(); };
                grid.appendChild(el);
            }
        }

        function changeMonth(dir) {
            currentMonth += dir; if(currentMonth > 11) { currentMonth = 0; currentYear++; } if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function renderSelectedDay() {
            const container = document.getElementById('selected-day-details');
            const waterCount = window.waterHistory[selectedDateStr] || 0; const waterLiters = (waterCount * 0.25).toFixed(2);
            let dayData = window.historyLog[selectedDateStr]; let isToday = false;

            if (selectedDateStr === getTodayDate()) { isToday = true; if (window.consumedToday && window.userMacros) { dayData = { consumed: window.consumedToday, target: window.userMacros, items: window.consumedItems }; } }
            if (!dayData && waterCount === 0) { container.innerHTML = '<div style="text-align: center; color: var(--text-gray); margin-top: 30px; font-weight: 500;">Нет данных за этот день</div>'; return; }
            if (!dayData) { dayData = { consumed: {cal: 0, protein: 0, fat: 0, carbs: 0}, target: window.userMacros || {cal: 0}, items: [] }; }

            const isOver = dayData.consumed.cal > dayData.target.cal; const calColor = isOver ? 'var(--accent-red)' : 'var(--accent-green)';
            let itemsHtml = dayData.items.map(i => `<div style="font-size:13px; color:var(--text-gray); margin-top:8px; display:flex; align-items:center; gap:8px;"><span style="font-size: 18px; background:#F2F2F7; border-radius:6px; padding:2px;">${i.em || '🍽'}</span> ${i.name} — <b style="color:var(--text-dark)">${i.cal} ккал</b></div>`).join('');

            container.innerHTML = `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; font-size: 16px; font-weight: 700; border-bottom: 1px solid #F2F2F7; padding-bottom: 15px; margin-bottom: 15px;">
                        <span><i class="ph-bold ph-calendar-blank"></i> ${selectedDateStr} ${isToday ? '(Сегодня)' : ''}</span>
                        <span style="color: ${calColor};">${dayData.consumed.cal} / ${dayData.target.cal} ккал</span>
                    </div>
                    <div style="font-size: 14px; font-weight: 600; color: var(--accent-blue); display:flex; align-items:center; gap:5px; margin-bottom: 10px;">
                        <i class="ph-fill ph-drop"></i> Вода: ${waterCount} стак. (${waterLiters} л)
                    </div>
                    <details open>
                        <summary><i class="ph-bold ph-caret-down"></i> Детали питания</summary>
                        <div style="margin-top: 15px; font-size: 13px; font-weight: 600; background: #F2F2F7; padding: 12px; border-radius: 12px; display:flex; justify-content:space-between;">
                            <span>Б: ${dayData.consumed.protein}г</span><span>Ж: ${dayData.consumed.fat}г</span><span>У: ${dayData.consumed.carbs}г</span>
                        </div>
                        <div style="margin-top: 10px;">
                            ${itemsHtml || '<div style="color:var(--text-gray); font-size:13px; margin-top:10px; text-align:center;">Ничего не записано</div>'}
                        </div>
                    </details>
                </div>
            `;
        }

        // НОВЫЕ ФУНКЦИИ КАМЕРЫ И ГАЛЕРЕИ
        function triggerDirectCamera() { document.getElementById('direct-camera-input').click(); }
        function triggerGallery() { document.getElementById('gallery-input').click(); }
        
        async function uploadImage(event) {
            const file = event.target.files[0]; if (!file) return;
            showLoader('Изучаю фото...'); const formData = new FormData(); formData.append('image', file);
            await sendToNgrok('/upload', formData, false); event.target.value = ''; 
        }

        async function sendTextToAI() {
            const textInput = document.getElementById('text-food-input').value; if(!textInput) return;
            showLoader('Считаю граммы...'); await sendToNgrok('/text', JSON.stringify({ text: textInput }), true);
            document.getElementById('text-food-input').value = '';
        }

        async function sendToNgrok(endpoint, bodyData, isJson) {
            try {
                const options = { method: 'POST', body: bodyData }; if(isJson) options.headers = { 'Content-Type': 'application/json' };
                const response = await fetch('https://64.188.61.46.nip.io' + endpoint, options);
                if (!response.ok) throw new Error('Ошибка связи');
                const data = await response.json(); if (data.error) throw new Error(data.error);
                aiName = data.name; aiCal = parseInt(data.cal); aiP = parseInt(data.protein); aiF = parseInt(data.fat); aiC = parseInt(data.carbs); aiAl = data.allergens || 'Нет'; aiEmoji = data.emoji || '🍽';
                renderSandbox();
            } catch (err) { tg.showAlert('Ой, не удалось подключиться к ИИ. Попробуй еще раз!'); document.getElementById('loading-screen').style.display = 'none'; }
        }

        function showLoader(msg) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('loader-message').innerHTML = `<i class="ph ph-spinner-gap ph-spin" style="font-size: 36px; display:block; margin-bottom: 15px; color: var(--accent-blue);"></i>${msg}`;
            document.getElementById('loading-screen').style.display = 'block';
        }

        function renderSandbox() {
            document.getElementById('loading-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('food-name').innerText = `${aiEmoji} ${aiName}`; document.getElementById('food-cal').innerText = aiCal + " ккал";
            document.getElementById('sandbox-p').innerText = `Б: ${aiP} г`; document.getElementById('sandbox-f').innerText = `Ж: ${aiF} г`; document.getElementById('sandbox-c').innerText = `У: ${aiC} г`;
            document.getElementById('food-allergens').innerText = aiAl; document.getElementById('sandbox-screen').style.display = 'block';
        }

        async function saveRealFood() {
            const btn = document.getElementById('save-food-btn'); btn.innerText = "Сохраняем..."; btn.disabled = true;
            window.consumedToday.cal += aiCal; window.consumedToday.protein += aiP; window.consumedToday.fat += aiF; window.consumedToday.carbs += aiC;
            window.consumedItems.push({ id: Date.now(), name: aiName, cal: aiCal, p: aiP, f: aiF, c: aiC, al: aiAl, em: aiEmoji });
            
            await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems)); await saveToCloud('lastDate', getTodayDate());
            
            btn.innerText = "Записать в дневник"; btn.disabled = false; window.history.replaceState({}, document.title, window.location.pathname);
            document.getElementById('sandbox-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'flex'; switchTab('home'); updateDashboard();
        }

        function cancelFood() { window.history.replaceState({}, document.title, window.location.pathname); document.getElementById('sandbox-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'flex'; switchTab('home'); }

        const waterGlasses = document.querySelectorAll('.glass'); const waterText = document.getElementById('water-text');
        function loadWater() { const today = getTodayDate(); let waterCount = window.waterHistory[today] || 0; updateWaterUI(waterCount); }

        function updateWaterUI(count) {
            waterGlasses.forEach((glass, index) => { if (index < count) { glass.classList.add('filled'); } else { glass.classList.remove('filled'); } });
            let liters = (count * 0.25).toFixed(2); waterText.innerText = `Выпито: ${count} / 8 стаканов (${liters} л)`;
        }

        waterGlasses.forEach(glass => {
            glass.addEventListener('click', async function() {
                let clickedIndex = parseInt(this.getAttribute('data-index')); const today = getTodayDate(); let currentWater = window.waterHistory[today] || 0;
                if (clickedIndex === currentWater) { window.waterHistory[today] = currentWater - 1; } else { window.waterHistory[today] = clickedIndex; }
                
                updateWaterUI(window.waterHistory[today]);
                await saveToCloud('water_history', JSON.stringify(window.waterHistory));
                if (document.getElementById('tab-progress').classList.contains('active-screen')) { renderSelectedDay(); }
            });
        });
    </script>
</body>
</html>
