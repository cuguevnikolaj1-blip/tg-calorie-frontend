<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Food Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Немного базового дизайна, чтобы текст был по центру и брал цвета из Telegram */
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 50px;
            /* Переменные Telegram подстроят фон и текст под тему пользователя */
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
        }
        h1 {
            font-size: 24px;
        }
    </style>
</head>
<body>
    <h1 id="welcome-text">Загрузка...</h1>

    <script>
        // Сообщаем приложению, что мы готовы работать
        const tg = window.Telegram.WebApp;
        
        // Разворачиваем окно Mini App на максимум
        tg.expand(); 

        // Достаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        
        // Если данные нашлись (открыто в Telegram), пишем имя. Если открыто просто в браузере - пишем "гость"
        if (user && user.first_name) {
            document.getElementById('welcome-text').innerText = `Добро пожаловать, ${user.first_name}!`;
        } else {
            document.getElementById('welcome-text').innerText = 'Добро пожаловать, гость!';
        }
    </script>
</body>
</html>
