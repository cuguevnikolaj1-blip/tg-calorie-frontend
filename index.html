<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Food Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: var(--tg-theme-bg-color, #ffffff); color: var(--tg-theme-text-color, #000000); margin: 0; padding: 20px; box-sizing: border-box; }
        h1, h2 { text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; }
        input[type="number"], select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #ffffff); border: none; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .btn-secondary { background-color: #f0f0f0; color: #333; margin-top: 5px; }
        #onboarding-screen, #result-screen, #dashboard-screen, #sandbox-screen, #loading-screen { display: none; }
        
        .dashboard-container { text-align: center; }
        .circle-wrap { position: relative; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
        .circle-inner { background-color: var(--tg-theme-bg-color, #ffffff); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .main-circle { width: 200px; height: 200px; background: conic-gradient(#e0e0e0 100%, #e0e0e0 0); margin-bottom: 30px; }
        .main-circle .circle-inner { width: 175px; height: 175px; }
        .main-circle-title { font-size: 16px; color: gray; }
        .main-circle-value { font-size: 28px; font-weight: bold; margin: 5px 0; }
        
        .macros-row { display: flex; justify-content: space-between; }
        .macro-circle { width: 90px; height: 90px; background: conic-gradient(#e0e0e0 100%, #e0e0e0 0); }
        .macro-circle .circle-inner { width: 75px; height: 75px; }
        .macro-name { font-size: 12px; color: gray; }
        .macro-value { font-size: 14px; font-weight: bold; }
        .add-food-btn { margin-top: 40px; font-size: 18px; padding: 15px; }

        .food-card { background: rgba(0,0,0,0.05); padding: 20px; border-radius: 12px; text-align: left; margin-bottom: 20px; }
        .food-card h3 { margin-top: 0; text-align: center; }
        .food-macros { display: flex; justify-content: space-between; margin: 15px 0; font-weight: bold; font-size: 14px;}
        details { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        summary { font-weight: bold; cursor: pointer; outline: none; }
        .loader-text { text-align: center; font-size: 18px; margin-top: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loader-text" id="loader-message">🔄 Синхронизация...</div>
    </div>

    <div id="onboarding-screen">
        <h1 id="welcome-text">Привет!</h1>
        <h2>Давай рассчитаем твою норму</h2>
        <div class="form-group"><label>Пол</label><select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
        <div class="form-group"><label>Возраст</label><input type="number" id="age" value="25"></div>
        <div class="form-group"><label>Рост</label><input type="number" id="height" value="180"></div>
        <div class="form-group"><label>Вес</label><input type="number" id="weight" value="75"></div>
        <div class="form-group"><label>Активность</label><select id="activity"><option value="1.2">Минимальная</option><option value="1.375">Слабая</option><option value="1.55" selected>Средняя</option><option value="1.725">Высокая</option></select></div>
        <button onclick="calculateKcal()">Рассчитать норму</button>
    </div>

    <div id="result-screen">
        <h2 style="margin-top:50px;">Твоя цель на день:</h2>
        <h1 id="total-kcal-result" style="font-size: 40px;">0 ккал</h1>
        <button onclick="saveAndGoToMain()">Отлично, погнали!</button>
    </div>

    <div id="dashboard-screen" class="dashboard-container">
        <h2>Сводка за день</h2>
        <div class="circle-wrap main-circle" id="circle-cal"><div class="circle-inner"><span class="main-circle-title">Осталось</span><span class="main-circle-value" id="cal-left">0</span><span class="main-circle-title">из <span id="cal-target">0</span> ккал</span></div></div>
        <div class="macros-row">
            <div class="circle-wrap macro-circle" id="circle-protein"><div class="circle-inner"><span class="macro-value" id="protein-text">0/0</span><span class="macro-name">Белки</span></div></div>
            <div class="circle-wrap macro-circle" id="circle-fat"><div class="circle-inner"><span class="macro-value" id="fat-text">0/0</span><span class="macro-name">Жиры</span></div></div>
            <div class="circle-wrap macro-circle" id="circle-carbs"><div class="circle-inner"><span class="macro-value" id="carbs-text">0/0</span><span class="macro-name">Углеводы</span></div></div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 40px;">
            <button class="add-food-btn" style="margin-top: 0; flex: 1; background-color: #4caf50;" onclick="closeAndSendPhoto()">
                📸 Фото в чат
            </button>
            
            <button class="add-food-btn" style="margin-top: 0; flex: 1;" onclick="triggerCamera()">
                🖼 Галерея
            </button>
        </div>
        <input type="file" id="camera-input" accept="image/*" style="display: none;" onchange="uploadImage(event)">
    </div>

    <div id="sandbox-screen">
        <h2>Распознано:</h2>
        <div class="food-card">
            <h3 id="food-name">Загрузка...</h3>
            <h1 id="food-cal" style="text-align: center; margin: 10px 0; color: #2481cc;">0 ккал</h1>
            <div class="food-macros" id="food-macros-text"></div>
            <details>
                <summary>Аллергены</summary>
                <p id="food-allergens" style="font-size: 14px; margin-top: 5px; color: #e53935; font-weight: bold;">Нет</p>
            </details>
        </div>
        <button id="save-food-btn" onclick="saveRealFood()">Записать в дневник</button>
        <button class="btn-secondary" onclick="cancelFood()">Отмена</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); 
        
        let tempMacros = {};
        window.userMacros = null;
        window.consumedToday = null;

        // 1. ВОЗВРАЩАЕМ ЧТЕНИЕ ДАННЫХ ИЗ ССЫЛКИ (для кнопки из чата)
        const urlParams = new URLSearchParams(window.location.search);
        let aiName = urlParams.get('name') || '';
        let aiCal = parseInt(urlParams.get('cal')) || 0;
        let aiP = parseInt(urlParams.get('p')) || 0;
        let aiF = parseInt(urlParams.get('f')) || 0;
        let aiC = parseInt(urlParams.get('c')) || 0;
        let aiAl = urlParams.get('al') || 'Нет';

        function saveToCloud(key, value) {
            return new Promise((resolve) => tg.CloudStorage.setItem(key, value, (err, success) => resolve(success)));
        }

        function getFromCloud(key) {
            return new Promise((resolve) => tg.CloudStorage.getItem(key, (err, value) => resolve(value)));
        }

        function getTodayDate() {
            return new Date().toLocaleDateString();
        }

        window.onload = async function() {
            document.getElementById('loading-screen').style.display = 'block';

            const userMacrosStr = await getFromCloud('userMacros');
            let consumedTodayStr = await getFromCloud('consumedToday');
            let lastDateStr = await getFromCloud('lastDate');
            
            const today = getTodayDate();

            if (lastDateStr !== today && userMacrosStr) {
                consumedTodayStr = JSON.stringify({ cal: 0, protein: 0, fat: 0, carbs: 0 });
                await saveToCloud('consumedToday', consumedTodayStr);
                await saveToCloud('lastDate', today);
            }

            window.userMacros = userMacrosStr ? JSON.parse(userMacrosStr) : null;
            window.consumedToday = consumedTodayStr ? JSON.parse(consumedTodayStr) : { cal: 0, protein: 0, fat: 0, carbs: 0 };

            document.getElementById('loading-screen').style.display = 'none';

            if (window.userMacros) {
                // 2. ПРОВЕРЯЕМ: если прилетели данные из чата - открываем Песочницу!
                if (aiName && aiCal > 0) {
                    renderSandbox();
                } else {
                    renderDashboard();
                }
            } else {
                document.getElementById('onboarding-screen').style.display = 'block';
            }
        };

        function hideAllScreens() { document.querySelectorAll('div[id$="-screen"]').forEach(el => el.style.display = 'none'); }

        function calculateKcal() {
            const age = parseInt(document.getElementById('age').value);
            const height = parseInt(document.getElementById('height').value);
            const weight = parseInt(document.getElementById('weight').value);
            const activity = parseFloat(document.getElementById('activity').value);
            const gender = document.getElementById('gender').value;

            let bmr = gender === 'male' ? (10 * weight) + (6.25 * height) - (5 * age) + 5 : (10 * weight) + (6.25 * height) - (5 * age) - 161;
            const tdee = Math.round(bmr * activity);
            
            tempMacros = { cal: tdee, protein: Math.round((tdee * 0.3) / 4), fat: Math.round((tdee * 0.3) / 9), carbs: Math.round((tdee * 0.4) / 4) };
            document.getElementById('total-kcal-result').innerText = tdee + " ккал";
            hideAllScreens(); document.getElementById('result-screen').style.display = 'block';
        }

        async function saveAndGoToMain() {
            document.getElementById('result-screen').innerHTML = '<h2 style="margin-top:50px;">Сохраняем в облако... ⏳</h2>';
            
            window.userMacros = tempMacros;
            window.consumedToday = { cal: 0, protein: 0, fat: 0, carbs: 0 };

            await saveToCloud('userMacros', JSON.stringify(window.userMacros));
            await saveToCloud('consumedToday', JSON.stringify(window.consumedToday));
            await saveToCloud('lastDate', getTodayDate());
            
            document.getElementById('result-screen').innerHTML = '<h2 style="margin-top:50px;">Твоя цель на день:</h2><h1 id="total-kcal-result" style="font-size: 40px;">' + tempMacros.cal + ' ккал</h1><button onclick="saveAndGoToMain()">Отлично, погнали!</button>';
            renderDashboard();
        }

        function renderDashboard() {
            hideAllScreens();
            document.getElementById('dashboard-screen').style.display = 'block';

            const target = window.userMacros;
            const consumed = window.consumedToday;

            document.getElementById('cal-left').innerText = Math.max(0, target.cal - consumed.cal);
            document.getElementById('cal-target').innerText = target.cal;
            
            document.getElementById('protein-text').innerText = `${consumed.protein}/${target.protein}`;
            document.getElementById('fat-text').innerText = `${consumed.fat}/${target.fat}`;
            document.getElementById('carbs-text').innerText = `${consumed.carbs}/${target.carbs}`;

            updateCircle('circle-cal', consumed.cal, target.cal, '#2481cc');
            updateCircle('circle-protein', consumed.protein, target.protein, '#ff9800');
            updateCircle('circle-fat', consumed.fat, target.fat, '#f44336');
            updateCircle('circle-carbs', consumed.carbs, target.carbs, '#4caf50');
        }

        function updateCircle(elementId, current, max, color) {
            const percentage = Math.min((current / max) * 100, 100);
            document.getElementById(elementId).style.background = `conic-gradient(${color} ${percentage}%, #e0e0e0 0)`;
        }

        function triggerCamera() {
            document.getElementById('camera-input').click();
        }

        async function uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            hideAllScreens();
            document.getElementById('loader-message').innerText = '⏳ Нейросеть изучает фото...';
            document.getElementById('loading-screen').style.display = 'block';

            const formData = new FormData();
            formData.append('image', file);

            try {
                const response = await fetch('https://tova-unteeming-wanita.ngrok-free.dev/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Ошибка связи с сервером');

                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                aiName = data.name;
                aiCal = parseInt(data.cal);
                aiP = parseInt(data.protein);
                aiF = parseInt(data.fat);
                aiC = parseInt(data.carbs);
                aiAl = data.allergens || 'Нет';

                renderSandbox();

            } catch (err) {
                tg.showAlert('Ой, не удалось распознать фото. Попробуй еще раз!');
                renderDashboard();
            } finally {
                event.target.value = ''; 
                document.getElementById('loader-message').innerText = '🔄 Синхронизация...';
            }
        }

        function renderSandbox() {
            hideAllScreens();
            document.getElementById('food-name').innerText = aiName;
            document.getElementById('food-cal').innerText = aiCal + " ккал";
            document.getElementById('food-macros-text').innerHTML = `<span>Б: ${aiP} г</span><span>Ж: ${aiF} г</span><span>У: ${aiC} г</span>`;
            document.getElementById('food-allergens').innerText = aiAl;
            document.getElementById('sandbox-screen').style.display = 'block';
        }

        async function saveRealFood() {
            const btn = document.getElementById('save-food-btn');
            btn.innerText = "Сохраняем...";
            btn.disabled = true;

            window.consumedToday.cal += aiCal; 
            window.consumedToday.protein += aiP; 
            window.consumedToday.fat += aiF; 
            window.consumedToday.carbs += aiC;
            
            await saveToCloud('consumedToday', JSON.stringify(window.consumedToday));
            await saveToCloud('lastDate', getTodayDate());
            
            btn.innerText = "Записать в дневник";
            btn.disabled = false;

            // Очищаем ссылку, чтобы при обновлении страницы еда не записалась дважды
            window.history.replaceState({}, document.title, window.location.pathname);
            
            // Сбрасываем переменные
            aiName = ''; aiCal = 0; aiP = 0; aiF = 0; aiC = 0; aiAl = '';

            renderDashboard();
        }

        function cancelFood() {
            window.history.replaceState({}, document.title, window.location.pathname);
            aiName = ''; aiCal = 0; aiP = 0; aiF = 0; aiC = 0; aiAl = '';
            renderDashboard();
        }

        function closeAndSendPhoto() {
            tg.close();
        }
    </script>
</body>
</html>
