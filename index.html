<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Forma Tracker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            /* Палитра Forma */
            --lime: #D2DB76;
            --pink: #FFC3CC;
            --dark: #28301C;
            --cream: #F8F6F0;
            --ll: #EEF1CC;
            --lp: #FFF0F3;
            --mid: #5A5F4A;
            
            --macro-cal: var(--dark);
            --macro-protein: var(--pink);
            --macro-fat: var(--lime);
            --macro-carbs: var(--mid);   
            --water-blue: #8AB4F8; 
            --accent-red: #D9534F; 
            --radius: 24px;
        }

        * { -webkit-tap-highlight-color: transparent; }
        
        /* 🔥 ИСПРАВЛЕНИЕ 1: Сделали базовый шрифт толще (font-weight: 500) */
        body { font-family: 'Montserrat', sans-serif; background: var(--cream); background-attachment: fixed; color: var(--dark); margin: 0; padding: 60px 20px 110px 20px; box-sizing: border-box; min-height: 100vh; font-weight: 500; -webkit-font-smoothing: antialiased; }
        
        h2 { text-align: left; font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 600; text-transform: lowercase; margin-bottom: 24px; margin-top: 0; color: var(--dark); line-height: 1.1; }
        
        .card { position: relative; background: #FFFFFF; border: 1px solid rgba(40,48,28,0.06); border-radius: var(--radius); padding: 28px 24px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(40,48,28,0.03); max-width: 600px; margin-left: auto; margin-right: auto; transition: transform 0.3s ease; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--mid); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        input[type="number"], input[type="text"], select { width: 100%; padding: 16px; border-radius: 16px; border: 1px solid rgba(40,48,28,0.08); box-sizing: border-box; font-size: 16px; background: rgba(40,48,28,0.02); color: var(--dark); font-family: 'Montserrat', sans-serif; outline: none; transition: 0.2s; font-weight: 500; }
        input:focus { border-color: var(--lime); background: #fff; box-shadow: 0 0 0 4px rgba(210,219,118,0.2); }
        
        button { border: none; padding: 16px; border-radius: 18px; width: 100%; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600; }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.7; cursor: not-allowed; }
        
        /* Кнопки Forma */
        .btn-primary { background: var(--dark); color: #fff; box-shadow: 0 8px 20px rgba(40,48,28,0.2); font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; text-transform: lowercase; }
        .btn-secondary { background: var(--ll); color: var(--dark); font-weight: 600; font-size: 15px; }

        .screen { display: none; animation: fadeIn 0.4s ease; }
        .active-screen { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        #sandbox-screen { display: none; }
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--cream); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }

        .cal-donut-wrap { position: relative; width: 200px; height: 200px; margin: 0 auto 35px auto; }
        .cal-donut-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); filter: drop-shadow(0 8px 16px rgba(210,219,118,0.3)); }
        .cal-donut-wrap circle { fill: none; stroke-linecap: round; stroke-width: 10; transition: stroke-dashoffset 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .donut-inner-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .donut-title { font-size: 11px; color: var(--mid); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; transition: color 0.3s; margin-bottom: 4px;}
        .donut-value { font-family: 'Playfair Display', serif; font-size: 48px; font-weight: 700; margin: 0; color: var(--dark); line-height: 1; transition: color 0.3s;}
        .donut-subtitle { font-size: 13px; color: var(--mid); font-weight: 500; margin-top: 8px; }

        #streak-counter { display:none; margin: 0 auto 25px auto; width: fit-content; background: var(--lp); color: var(--dark); padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 13px; border: 1px solid rgba(255,195,204,0.5); }

        .macro-legend-card { display: flex; justify-content: space-between; background: var(--cream); padding: 20px 15px; border-radius: 24px; }
        .legend-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1;}
        .mini-ring-wrap { position: relative; width: 50px; height: 50px; margin-bottom: 8px; }
        .mini-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .mini-ring-wrap circle { fill: none; stroke-linecap: round; stroke-width: 4; transition: stroke-dashoffset 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .mini-icon { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .legend-title { font-size: 11px; color: var(--mid); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        .legend-value { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; color: var(--dark); }

        .water-header { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; color: var(--dark); font-family: 'Playfair Display', serif; font-weight: 600; font-size: 22px; text-transform: lowercase;}
        .glasses { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; flex-wrap: nowrap; }
        .glass { font-size: 24px; cursor: pointer; color: rgba(40,48,28,0.06); transition: all 0.3s ease; }
        @keyframes bounceDrop { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(1.2) translateY(-4px); } 100% { transform: scale(1.15) translateY(0); } }
        .glass.filled { color: var(--water-blue); transform: scale(1.15); animation: bounceDrop 0.4s ease; }
        #water-text { color: var(--mid); font-size: 13px; margin: 0; font-weight: 500; text-align: center; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-row input { flex: 1; margin: 0; }
        .input-row button { width: 60px; flex-shrink: 0; padding: 0; border-radius: 16px; }
        .buttons-column { display: flex; flex-direction: column; gap: 12px; }

        .history-item { background: rgba(40,48,28,0.02); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(40,48,28,0.04); max-width: 600px; margin: 0 auto 12px auto; transition: transform 0.2s;}
        .history-item:active { transform: scale(0.98); }
        .history-emoji { font-size: 28px; margin-right: 15px; background: #fff; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 16px; box-shadow: 0 4px 10px rgba(40,48,28,0.05); }
        .history-info { flex: 1; }
        .history-info h4 { margin: 0 0 6px 0; font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; color: var(--dark); text-transform: lowercase;}
        .history-info p { margin: 0; font-size: 13px; color: var(--mid); font-weight: 500;}
        
        .action-btns { display: flex; gap: 8px; margin-left: 10px; flex-shrink: 0; }
        .delete-btn, .edit-btn { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; padding: 0; border: none; cursor: pointer; transition: transform 0.2s;}
        .delete-btn:active, .edit-btn:active { transform: scale(0.9); }
        .delete-btn { background: var(--lp); color: var(--accent-red); }
        .edit-btn { background: var(--ll); color: var(--dark); }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-family: 'Playfair Display', serif; font-weight: 600; margin-bottom: 25px; font-size: 22px; text-transform: lowercase;}
        .calendar-header button { width: 40px; height: 40px; padding: 0; background: var(--cream); color: var(--dark); border-radius: 14px; font-weight: 700; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .calendar-day-name { font-size: 11px; color: var(--mid); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        
        /* Жестко фиксируем форму через aspect-ratio, чтобы не было вытянутых прямоугольников */
        .calendar-day { aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; border-radius: 16px; cursor: pointer; font-size: 15px; font-weight: 600; transition: 0.2s; background: transparent; color: var(--mid); margin: 0 auto; width: 100%; max-width: 45px; }
        .calendar-day.empty { cursor: default; }
        .calendar-day.has-data { background: var(--ll); color: var(--dark); font-weight: 600; }
        .calendar-day.status-green { box-shadow: inset 0 0 0 2px var(--lime); color: var(--dark);}
        .calendar-day.status-red { box-shadow: inset 0 0 0 2px var(--pink); color: var(--dark);}
        .calendar-day.status-yellow { box-shadow: inset 0 0 0 2px #E5C158; color: var(--dark);}
        .calendar-day.is-today { font-weight: 700; color: var(--dark); background: rgba(40,48,28,0.08); border: none; }
        .calendar-day.selected { background: var(--dark); color: #fff !important; box-shadow: 0 4px 10px rgba(40,48,28,0.2) !important;}

        details { width: 100%; }
        summary { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--dark); cursor: pointer; font-weight: 600; outline: none; margin-top: 20px; list-style: none; display: flex; align-items: center; gap: 8px; text-transform: lowercase;}
        summary::-webkit-details-marker { display: none; }

        .bottom-nav { position: fixed; bottom: 30px; left: 24px; right: 24px; background: var(--dark); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 35px; display: flex; justify-content: space-around; padding: 18px 10px; box-shadow: 0 20px 40px rgba(40,48,28,0.3); z-index: 1000; max-width: 500px; margin: 0 auto; }
        .nav-item { text-align: center; color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; flex: 1; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.3s; }
        .nav-item.active { color: #FFFFFF; }
        .nav-icon { font-size: 26px; margin-bottom: 6px; transition: 0.3s; }
        .nav-item.active .nav-icon { transform: translateY(-4px); }
        
        /* --- LOADER FORMA --- */
        .forma-loader-text { font-family: 'Playfair Display', serif; font-size: 56px; font-weight: 700; text-transform: lowercase; color: var(--dark); animation: pulse 1.5s infinite ease-in-out; margin-bottom: 20px; }
        .forma-loader-sub { font-size: 13px; color: var(--mid); font-weight: 600; letter-spacing: 4px; text-transform: uppercase; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.95); } }

        /* --- MINI LOADER --- */
        .mini-search-icon { display: inline-block; font-size: inherit; animation: miniSearch 0.8s infinite alternate ease-in-out; }
        @keyframes miniSearch { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        .lang-slider-wrapper { margin-bottom: 24px; }
        .lang-slider-title { display: block; margin-bottom: 10px; font-size: 12px; color: var(--mid); font-weight: 600; text-transform: uppercase; letter-spacing: 1px;}
        .lang-toggle { position: relative; display: flex; background: rgba(40,48,28,0.04); border-radius: 16px; padding: 4px; align-items: center; }
        .lang-toggle-thumb { position: absolute; top: 4px; bottom: 4px; width: calc(25% - 2px); background: #FFFFFF; border-radius: 12px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); z-index: 1; box-shadow: 0 4px 10px rgba(40,48,28,0.06); }
        .lang-btn { position: relative; flex: 1; text-align: center; padding: 12px 0; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; color: var(--mid); border: none; background: none; cursor: pointer; z-index: 2; transition: color 0.3s; outline: none; }
        .lang-toggle[data-active="en"] .lang-toggle-thumb { transform: translateX(0%); }
        .lang-toggle[data-active="ru"] .lang-toggle-thumb { transform: translateX(100%); }
        .lang-toggle[data-active="es"] .lang-toggle-thumb { transform: translateX(200%); }
        .lang-toggle[data-active="zh"] .lang-toggle-thumb { transform: translateX(300%); }
        .lang-toggle[data-active="en"] .lang-btn[data-lang="en"] { color: var(--dark); }
        .lang-toggle[data-active="ru"] .lang-btn[data-lang="ru"] { color: var(--dark); }
        .lang-toggle[data-active="es"] .lang-btn[data-lang="es"] { color: var(--dark); }
        .lang-toggle[data-active="zh"] .lang-btn[data-lang="zh"] { color: var(--dark); }

        .notify-toggle { position: relative; display: flex; background: rgba(40,48,28,0.04); border-radius: 16px; padding: 4px; align-items: center; }
        .notify-toggle-thumb { position: absolute; top: 4px; bottom: 4px; width: calc(50% - 4px); background: #FFFFFF; border-radius: 12px; transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); z-index: 1; box-shadow: 0 4px 10px rgba(40,48,28,0.06); }
        .notify-btn { position: relative; flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 700; border: none; background: none; cursor: pointer; z-index: 2; transition: color 0.3s; outline: none; color: var(--mid); }
        .notify-toggle[data-active="1"] .notify-toggle-thumb { transform: translateX(100%); }
        .notify-toggle[data-active="0"] .notify-toggle-thumb { transform: translateX(0%); }
        .notify-toggle[data-active="1"] .notify-btn[data-val="1"] { color: var(--dark); }
        .notify-toggle[data-active="0"] .notify-btn[data-val="0"] { color: var(--dark); }

        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(40,48,28,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 9999; display: none; justify-content: center; align-items: center; padding: 20px; animation: fadeIn 0.3s ease; }
        .modal-card { background: #FFFFFF; border-radius: 32px; padding: 40px 30px; text-align: center; box-shadow: 0 20px 40px rgba(40,48,28,0.15); max-width: 340px; width: 100%; transform: scale(0.95); animation: popUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popUp { to { transform: scale(1); } }
        .modal-icon { font-size: 60px; margin-bottom: 15px; }
        .modal-card h3 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--dark); font-weight: 700; margin: 0 0 12px 0; text-transform: lowercase;}
        .modal-card p { margin: 0 0 30px 0; font-size: 15px; color: var(--mid); font-weight: 500; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="loading-screen" class="screen active-screen">
        <div class="forma-loader-text">forma</div>
        <div class="forma-loader-sub" id="loader-message">загрузка...</div>
    </div>

    <div id="greeting-modal" class="modal-overlay">
        <div class="modal-card">
            <div id="greeting-icon" class="modal-icon">✨</div>
            <h3 id="greeting-title">Title</h3>
            <p id="greeting-text">Text</p>
            <button class="btn-primary" onclick="closeGreeting()" data-i18n="btn_lets_go">Продолжить</button>
        </div>
    </div>

    <div id="premium-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon">💎</div>
            <h3 data-i18n="prem_title">forma premium</h3>
            <p data-i18n="prem_desc" style="text-align: left;">
            </p>
            <button id="btn-buy-prem" class="btn-primary" onclick="buyPremium()" style="margin-bottom: 12px; background: var(--dark); color: #fff;"><span data-i18n="btn_buy">Купить</span></button>
            <button class="btn-secondary" onclick="closePremiumModal()"><span data-i18n="btn_later">Позже</span></button>
        </div>
    </div>

    <div id="tab-diary-summary" class="screen active-screen">
        <div class="card" style="text-align: center;">
            <div id="streak-counter">🔥 0</div>
            
            <div class="cal-donut-wrap">
                <svg viewBox="0 0 200 200">
                    <defs>
                        <linearGradient id="formaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#D2DB76"/>
                            <stop offset="100%" stop-color="#FFC3CC"/>
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="100" r="85" style="stroke: rgba(40,48,28,0.04);"></circle>
                    <circle id="svg-cal" cx="100" cy="100" r="85" style="stroke: url(#formaGrad); stroke-dasharray: 534; stroke-dashoffset: 534;"></circle>
                </svg>
                <div class="donut-inner-text">
                    <span class="donut-title" id="main-cal-title" data-i18n="consumed">СЪЕДЕНО</span>
                    <span class="donut-value" id="cal-consumed">0</span>
                    <span class="donut-subtitle"><span data-i18n="out_of">из</span> <span id="cal-target">0</span> <span data-i18n="kcal">ккал</span></span>
                </div>
            </div>
            
            <div class="macro-legend-card">
                <div class="legend-item">
                    <div class="mini-ring-wrap">
                        <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="22" style="stroke: rgba(40,48,28,0.04);"></circle><circle id="svg-protein" cx="25" cy="25" r="22" style="stroke: var(--macro-protein); stroke-dasharray: 138; stroke-dashoffset: 138;"></circle></svg>
                        <div class="mini-icon"><i class="ph ph-egg" style="color: var(--macro-protein);"></i></div>
                    </div>
                    <span class="legend-title" data-i18n="protein">Белки</span>
                    <span class="legend-value" id="protein-text">0г</span>
                </div>
                <div class="legend-item">
                    <div class="mini-ring-wrap">
                        <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="22" style="stroke: rgba(40,48,28,0.04);"></circle><circle id="svg-fat" cx="25" cy="25" r="22" style="stroke: var(--macro-fat); stroke-dasharray: 138; stroke-dashoffset: 138;"></circle></svg>
                        <div class="mini-icon"><i class="ph ph-drop" style="color: var(--macro-fat);"></i></div>
                    </div>
                    <span class="legend-title" data-i18n="fats">Жиры</span>
                    <span class="legend-value" id="fat-text">0г</span>
                </div>
                <div class="legend-item">
                    <div class="mini-ring-wrap">
                        <svg viewBox="0 0 50 50"><circle cx="25" cy="25" r="22" style="stroke: rgba(40,48,28,0.04);"></circle><circle id="svg-carbs" cx="25" cy="25" r="22" style="stroke: var(--macro-carbs); stroke-dasharray: 138; stroke-dashoffset: 138;"></circle></svg>
                        <div class="mini-icon"><i class="ph ph-grains" style="color: var(--macro-carbs);"></i></div>
                    </div>
                    <span class="legend-title" data-i18n="carbs">Углеводы</span>
                    <span class="legend-value" id="carbs-text">0г</span>
                </div>
            </div>
        </div>
        
        <div class="card">
            <div class="water-header"><i class="ph ph-drop" style="color:var(--water-blue)"></i> <span data-i18n="water_title">вода (250 мл)</span></div>
            <div class="glasses" id="water-glasses">
                <div class="glass" data-index="1"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="2"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="3"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="4"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="5"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="6"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="7"><i class="ph-fill ph-drop"></i></div>
                <div class="glass" data-index="8"><i class="ph-fill ph-drop"></i></div>
            </div>
            <p id="water-text"></p>
        </div>
        
        <div class="card">
            <div class="input-row">
                <input type="text" id="text-food-input" placeholder="Что вы съели?" onkeypress="handleTextEnter(event)">
                <button class="btn-primary" style="width:64px; border-radius: 16px;" onclick="sendTextToAI()"><i class="ph-bold ph-paper-plane-right" style="font-size: 24px;"></i></button>
            </div>
            <div class="buttons-column">
                <button class="btn-primary" onclick="closeAndSendPhoto()"><i class="ph-bold ph-camera"></i> <span data-i18n="btn_photo">Сфотографировать еду</span></button>
                <button class="btn-secondary" onclick="triggerGallery()"><i class="ph-bold ph-image"></i> <span data-i18n="btn_gallery">Выбрать из Галереи</span></button>
            </div>
            <input type="file" id="gallery-input" accept="image/*" style="display: none;" onchange="uploadImage(event)">
        </div>
    </div>

    <div id="tab-history" class="screen">
        <h2 data-i18n="history">история</h2>
        <div id="history-list"></div>
    </div>

    <div id="tab-calendar" class="screen">
        <h2 data-i18n="calendar">календарь</h2>
        <div class="card">
            <div class="calendar-header">
                <button onclick="changeMonth(-1)"><i class="ph-bold ph-caret-left"></i></button>
                <span id="calendar-month-year">...</span>
                <button onclick="changeMonth(1)"><i class="ph-bold ph-caret-right"></i></button>
            </div>
            <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div id="selected-day-details"></div>
    </div>

    <div id="tab-profile" class="screen">
        <h2 data-i18n="profile">профиль</h2>
        <div class="card">
            <div style="text-align: center; margin-bottom: 30px;">
                <img id="profile-avatar" src="" style="width: 90px; height: 90px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, var(--lime), var(--pink)); display: none; margin: 0 auto; box-shadow: 0 8px 20px rgba(210,219,118,0.3);">

                    if (width > maxSize || height > maxSize) {
                        const scale = maxSize / Math.max(width, height);
                        width *= scale; height *= scale;
                    }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    canvas.toBlob(resolve, 'image/jpeg', 0.85); // Сжимаем в легкий JPEG
                };
                img.src = URL.createObjectURL(file);
            });
        }

        function sanitizeKey(k) { return k.replace(/\./g, '_'); }
        function desanitizeKey(k) { return k.replace(/(\d{2})_(\d{2})_(\d{4})/g, '$1.$2.$3'); }

        const delay = (ms) => new Promise(r => setTimeout(r, ms));

        function getCloudKeys() {
            return new Promise((resolve, reject) => {
                let handled = false;
                const t = setTimeout(() => { if(!handled) { handled=true; reject(new Error("Таймаут ключей")); } }, 4000); 
                try { 
                    tg.CloudStorage.getKeys((err, keys) => { 
                        if(!handled) { 
                            handled=true; clearTimeout(t); 
                            if(err) reject(new Error(err)); 
                            else { resolve((keys || []).map(desanitizeKey)); }
                        } 
                    }); 
                } catch(e) { if(!handled) { handled=true; clearTimeout(t); reject(e); } } 
            });
        }

        function getCloudItems(keysArray) {
            return new Promise((resolve, reject) => {
                if (!keysArray || keysArray.length === 0) return resolve({});
                const safeKeys = keysArray.map(sanitizeKey);
                let handled = false;
                const t = setTimeout(() => { if(!handled) { handled=true; reject(new Error("Таймаут данных")); } }, 4500); 
                try { 
                    tg.CloudStorage.getItems(safeKeys, (err, vals) => { 
                        if(!handled) { 
                            handled=true; clearTimeout(t); 
                            if(err) reject(new Error(err)); 
                            else {
                                let restoredVals = {};
                                if (vals) { for (let k in vals) { restoredVals[desanitizeKey(k)] = vals[k]; } }
                                resolve(restoredVals); 
                            }
                        } 
                    }); 
                } catch(e) { if(!handled) { handled=true; clearTimeout(t); reject(e); } }
            });
        }

        async function safeCloudFetch(action, keys, retries = 3) {
            let lastError;
            for(let i = 0; i < retries; i++) {
                try {
                    if(action === 'keys') return await getCloudKeys();
                    if(action === 'items') return await getCloudItems(keys);
                } catch(e) { lastError = e; await delay(800); }
            }
            throw lastError;
        }

        function removeCloudItem(key) {
            const safeKey = sanitizeKey(key);
            return new Promise((resolve) => {
                let handled = false;
                const t = setTimeout(() => { if(!handled) { handled=true; resolve(false); } }, 4000); 
                try { tg.CloudStorage.removeItem(safeKey, (err, ok) => { if(!handled) { handled=true; clearTimeout(t); resolve(!err); } }); }
                catch(e) { if(!handled) { handled=true; clearTimeout(t); resolve(false); } }
            });
        }

        async function saveToCloud(key, value) {
            await delay(200); 
            const safeKey = sanitizeKey(key);
            return new Promise((resolve) => {
                let handled = false;
                const t = setTimeout(() => { if(!handled) { handled=true; resolve(false); } }, 6000); 
                try { tg.CloudStorage.setItem(safeKey, value, (err, ok) => { if(!handled) { handled=true; clearTimeout(t); resolve(!err); } }); }
                catch(e) { if(!handled) { handled=true; clearTimeout(t); resolve(false); } }
            });
        }

        async function calculateAndSaveKcal() {
            const btn = document.querySelector('#tab-profile .btn-primary');
            btn.innerHTML = t('saving'); btn.disabled = true;

            const age = parseInt(document.getElementById('age').value); const height = parseInt(document.getElementById('height').value);
            const weight = parseInt(document.getElementById('weight').value); const activity = parseFloat(document.getElementById('activity').value);
            const gender = document.getElementById('gender').value; const goal = document.getElementById('goal').value;

            const notifyVal = document.getElementById('notify').value;
            await saveToCloud('notifyPref', notifyVal);
            syncSettingsWithServer(notifyVal);

            let bmr = gender === 'male' ? (10 * weight) + (6.25 * height) - (5 * age) + 5 : (10 * weight) + (6.25 * height) - (5 * age) - 161;
            let tdee = Math.round(bmr * activity);
            
            let pPct = 0.3, fPct = 0.3, cPct = 0.4; 
            if (goal === 'lose') { tdee = Math.round(tdee * 0.80); pPct = 0.4; fPct = 0.3; cPct = 0.3; } 
            else if (goal === 'gain') { tdee = Math.round(tdee * 1.15); pPct = 0.3; fPct = 0.2; cPct = 0.5; }
            
            window.userMacros = { goal: goal, cal: tdee, protein: Math.round((tdee * pPct) / 4), fat: Math.round((tdee * fPct) / 9), carbs: Math.round((tdee * cPct) / 4) };
            await saveToCloud('userMacros', JSON.stringify(window.userMacros));
            
            // Сохраняем сырые данные для отображения в профиле
            const userProfile = { age, height, weight, activity, gender, goal };
            await saveToCloud('userProfile', JSON.stringify(userProfile));
            
            if(!window.consumedToday) {
                window.consumedToday = { cal: 0, protein: 0, fat: 0, carbs: 0 }; window.consumedItems = [];
                await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems));
                await saveToCloud('lastDate', getTodayDate()); document.getElementById('bottom-nav').style.display = 'flex';
            }

            btn.innerHTML = t('btn_save_prof'); btn.disabled = false;
            const msg = document.getElementById('profile-saved-msg'); msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; switchTab('diary-summary'); updateDashboard(); }, 1000);
        }

        function calculateStreak() {
            let streak = 0;
            const todayObj = new Date();

            for (let i = 1; i < 365; i++) {
                let d = new Date(todayObj);
                d.setDate(d.getDate() - i);
                let dateStr = getFormattedDate(d);
                let dayData = window.historyLog[dateStr];
                
                if (!dayData || !dayData.target || dayData.consumed.cal === 0) break; 
                
                let pct = dayData.consumed.cal / dayData.target.cal;
                if (pct >= 0.9 && pct <= 1.1) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }

            const streakEl = document.getElementById('streak-counter');

                    streakEl.style.display = 'inline-block';
                } else {
                    streakEl.style.display = 'none';
                }
            }
        }

        function getDayColorStatus(pct, goal) {
            goal = goal || 'maintain';
            if (pct >= 0.9 && pct <= 1.1) return 'green';
            if (goal === 'lose') return pct > 1.1 ? 'red' : 'yellow';
            if (goal === 'gain') return pct < 0.9 ? 'red' : 'yellow';
            return 'red';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid'); const monthYearText = document.getElementById('calendar-month-year'); grid.innerHTML = '';
            monthYearText.innerText = `${t('months')[currentMonth]} ${currentYear}`;
            
            t('days').forEach(d => { const el = document.createElement('div'); el.className = 'calendar-day-name'; el.innerText = d; grid.appendChild(el); });

            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); let emptyDays = firstDay === 0 ? 6 : firstDay - 1;
            for(let i = 0; i < emptyDays; i++) { const el = document.createElement('div'); el.className = 'calendar-day empty'; grid.appendChild(el); }

            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate(); const waterHistory = window.waterHistory;

            for(let d = 1; d <= daysInMonth; d++) {
                const dateObj = new Date(currentYear, currentMonth, d); const dateStr = getFormattedDate(dateObj);
                const el = document.createElement('div'); el.className = 'calendar-day'; el.innerText = d;

                let hasWater = waterHistory[dateStr] > 0;
                let statusClass = '';

                if (dateStr === getTodayDate() && window.consumedToday && window.consumedToday.cal > 0) {
                    let pct = window.consumedToday.cal / window.userMacros.cal;
                    statusClass = getDayColorStatus(pct, window.userMacros.goal);
                } else if (window.historyLog[dateStr] && window.historyLog[dateStr].consumed.cal > 0) {
                    let pct = window.historyLog[dateStr].consumed.cal / window.historyLog[dateStr].target.cal;
                    let pastGoal = window.historyLog[dateStr].target.goal || 'maintain';
                    statusClass = getDayColorStatus(pct, pastGoal);
                }

                if (statusClass) {
                    el.classList.add('status-' + statusClass);
                } else if (hasWater) {
                    el.classList.add('has-data');
                }
                
                if (dateStr === getTodayDate() && !statusClass) el.classList.add('is-today');
                if(dateStr === selectedDateStr) el.classList.add('selected');

                el.onclick = () => { selectedDateStr = dateStr; renderCalendar(); renderSelectedDay(); };
                grid.appendChild(el);
            }
        }

        function changeMonth(dir) {
            currentMonth += dir; if(currentMonth > 11) { currentMonth = 0; currentYear++; } if(currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function renderSelectedDay() {
            const container = document.getElementById('selected-day-details');
            const waterCount = window.waterHistory[selectedDateStr] || 0; const waterLiters = (waterCount * 0.25).toFixed(2);
            let dayData = window.historyLog[selectedDateStr]; let isToday = false;

            if (selectedDateStr === getTodayDate()) { isToday = true; if (window.consumedToday && window.userMacros) { dayData = { consumed: window.consumedToday, target: window.userMacros, items: window.consumedItems }; } }
            if (!dayData && waterCount === 0) { container.innerHTML = `<div style="text-align: center; color: var(--mid); margin-top: 30px; font-weight: 500;">${t('no_data')}</div>`; return; }
            if (!dayData) { dayData = { consumed: {cal: 0, protein: 0, fat: 0, carbs: 0}, target: window.userMacros || {cal: 0}, items: [] }; }

            let dayPct = dayData.target.cal > 0 ? (dayData.consumed.cal / dayData.target.cal) : 0;
            let statusColor = 'var(--dark)';
            let pastGoal = dayData.target.goal || 'maintain';
            if (dayData.consumed.cal > 0) {
                let status = getDayColorStatus(dayPct, pastGoal);
                if (status === 'green') statusColor = 'var(--lime)';
                if (status === 'red') statusColor = 'var(--pink)';
                if (status === 'yellow') statusColor = '#E5C158';
            }

            let itemsHtml = dayData.items.map(i => `<div style="font-size:13px; color:var(--mid); margin-top:8px; display:flex; align-items:center; gap:8px;"><span style="font-size: 16px; background:rgba(40,48,28,0.03); border-radius:8px; padding:6px;">${escapeHTML(i.em || '🍽')}</span> ${escapeHTML(i.name)} — <b style="color:var(--dark)">${i.cal} ${t('kcal')}</b></div>`).join('');

            container.innerHTML = `
                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(40,48,28,0.06); padding-bottom: 15px; margin-bottom: 15px;">
                        <span style="font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600;"><i class="ph-bold ph-calendar-blank"></i> ${selectedDateStr} ${isToday ? t('today') : ''}</span>
                        <span style="color: var(--dark); font-weight: 600; font-size: 15px; background: ${statusColor}; padding: 4px 10px; border-radius: 12px;">${dayData.consumed.cal} / ${dayData.target.cal} ${t('kcal')}</span>
                    </div>
                    <div style="font-size: 14px; font-weight: 500; color: var(--water-blue); display:flex; align-items:center; gap:5px; margin-bottom: 10px;">
                        <i class="ph-bold ph-drop"></i> ${t('water_drank').replace('{c}', waterCount).replace('{l}', waterLiters)}
                    </div>
                    <details open>
                        <summary><i class="ph-bold ph-caret-down"></i> ${t('details')}</summary>
                        <div style="margin-top: 15px; font-size: 13px; font-weight: 500; background: var(--ll); color: var(--dark); padding: 14px; border-radius: 14px; display:flex; justify-content:space-between;">
                            <span>P: ${dayData.consumed.protein}g</span><span>F: ${dayData.consumed.fat}g</span><span>C: ${dayData.consumed.carbs}g</span>
                        </div>
                        <div style="margin-top: 15px;">
                            ${itemsHtml || `<div style="color:var(--mid); font-size:13px; margin-top:10px; text-align:center;">${t('nothing_logged')}</div>`}
                        </div>
                    </details>
                </div>
            `;
        }

        function triggerGallery() { document.getElementById('gallery-input').click(); }
        function closeAndSendPhoto() { tg.openTelegramLink('https://t.me/calories_miniapp_bot'); tg.close(); }
        
        async function uploadImage(event) {
            const file = event.target.files[0]; 
            if (!file) return;
            
            if (file.size > 5 * 1024 * 1024) {
                tg.showAlert(t('file_too_large'));
                event.target.value = '';
                return;
            }
            
            if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
                tg.showAlert(t('file_format_err'));
                event.target.value = '';
                return;
            }
            
            showLoader(t('load_prep'));

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 800;
                    let width = img.width; let height = img.height;
                    if (Math.max(width, height) > MAX_SIZE) {
                        if (width > height) {
                            height = Math.round((height * MAX_SIZE) / width); 
                            width = MAX_SIZE;
                        } else {
                            width = Math.round((width * MAX_SIZE) / height); 
                            height = MAX_SIZE;
                        }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData(); formData.append('image', blob, 'image.jpg'); 
                        showLoader(t('load_ai'));
                        await sendToNgrok('/upload', formData, false);
                    }, 'image/jpeg', 0.8);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file); event.target.value = ''; 
        }

        function handleTextEnter(event) { if(event.key === 'Enter') sendTextToAI(); }
        function handleRefineEnter(event) { if(event.key === 'Enter') sendRefineAI(); }

        async function sendTextToAI() {
            const textInput = document.getElementById('text-food-input').value.trim(); if(!textInput) return;
            if (textInput.length > 500) {
                tg.showAlert(t('text_too_long'));
                return;
            }
            showLoader(t('load_calc')); await sendToNgrok('/text', JSON.stringify({ text: textInput, lang: currLang }), true);
            document.getElementById('text-food-input').value = '';
        }

        async function sendToNgrok(endpoint, bodyData, isJson) {
            try {
                let finalEndpoint = endpoint + '?lang=' + currLang;
                const options = { method: 'POST', body: bodyData, headers: { 'Authorization': tg.initData || '' } }; 
                if(isJson) options.headers['Content-Type'] = 'application/json';
                
                const response = await fetch(API_BASE_URL + finalEndpoint, options);
                
                if (response.status === 403) {
                    const errData = await response.json();
                    if (errData.limit_reached) {
                        showPremiumModal();
                        throw new Error("limit_reached_silent"); 
                    }
                }
                
                if (response.status === 429) throw new Error('Слишком много запросов. Подождите минуту.');
                if (response.status === 401) throw new Error('Ошибка безопасности Telegram.');
                if (!response.ok) throw new Error('Ошибка связи');
                
                const data = await response.json(); if (data.error) throw new Error(data.error);
                aiName = data.name; aiCal = parseInt(data.cal); aiP = parseInt(data.protein); aiF = parseInt(data.fat); aiC = parseInt(data.carbs); aiAl = data.allergens || '-'; aiEmoji = data.emoji || '🍽';
                renderSandbox();
            } catch (err) { 
                document.getElementById('loading-screen').style.display = 'none'; 
                if (err.message === "limit_reached_silent") return; 
                const msg = err.message || t('error_ai');
                if (tg && tg.showAlert) { tg.showAlert(msg); } else { alert(msg); }
            }
        }

        function showLoader(msg) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('loader-message').innerText = msg;
            document.getElementById('loading-screen').classList.add('active-screen');
            document.getElementById('loading-screen').style.display = 'flex';
        }

        function renderSandbox() {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active-screen'));
            document.getElementById('loading-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'none';
            document.getElementById('food-name').innerText = `${aiEmoji} ${aiName}`; document.getElementById('food-cal').innerText = aiCal + ` ${t('kcal')}`;
            document.getElementById('sandbox-p').innerText = `P: ${aiP} г`; document.getElementById('sandbox-f').innerText = `F: ${aiF} г`; document.getElementById('sandbox-c').innerText = `C: ${aiC} г`;
            document.getElementById('food-allergens').innerText = aiAl; 
            
            const refineBtn = document.getElementById('btn-toggle-refine');
            if (window.userStatus === 'free') {
                refineBtn.innerHTML = `<i class="ph-bold ph-lock" style="color: var(--mid);"></i> <span data-i18n="btn_refine">${t('btn_refine')}</span>`;
                refineBtn.style.opacity = '0.7';
                refineBtn.onclick = showPremiumModal; 
            } else {
                refineBtn.innerHTML = `<i class="ph-bold ph-pencil-simple"></i> <span data-i18n="btn_refine">${t('btn_refine')}</span>`;
                refineBtn.style.opacity = '1';
                refineBtn.onclick = toggleRefine; 
            }
            
            document.getElementById('sandbox-screen').style.display = 'block';
        }

        function toggleRefine() {
            const block = document.getElementById('refine-block');
            block.style.display = block.style.display === 'none' ? 'block' : 'none';
        }

        async function sendRefineAI() {
            const textInput = document.getElementById('refine-input').value.trim();
            if(!textInput) return;
            
            if (textInput.length > 500) {
                tg.showAlert(t('text_too_long'));
                return;
            }

            const btn = document.getElementById('refine-btn');
            const origHtml = btn.innerHTML;
            btn.innerHTML = '<span class="mini-search-icon" style="font-size: 24px;">✨</span>';
            btn.disabled = true;

            const foodData = { name: aiName, cal: aiCal, p: aiP, f: aiF, c: aiC };
            const bodyData = JSON.stringify({ lang: currLang, correction: textInput, food: foodData });

            try {
                const response = await fetch(API_BASE_URL + '/refine', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': tg.initData || '' },
                    body: bodyData
                });

                if (response.status === 429) throw new Error('Слишком много запросов. Подождите минуту.');
                if (!response.ok) throw new Error('Ошибка связи');

                const data = await response.json();
                if (data.error) throw new Error(data.error);

                aiName = data.name; aiCal = parseInt(data.cal); aiP = parseInt(data.protein); aiF = parseInt(data.fat); aiC = parseInt(data.carbs); aiAl = data.allergens || '-'; aiEmoji = data.emoji || '🍽';

                document.getElementById('refine-input').value = '';
                document.getElementById('refine-block').style.display = 'none';
                renderSandbox();
            } catch (err) {
                const msg = err.message || t('error_ai');
                if (tg && tg.showAlert) { tg.showAlert(msg); } else { alert(msg); }
            } finally {
                btn.innerHTML = origHtml; btn.disabled = false;
            }
        }

        async function saveRealFood() {
            if (window.currentAppDate && window.currentAppDate !== getTodayDate()) { window.location.reload(); return; }

            const btn = document.getElementById('save-food-btn'); btn.innerHTML = t('saving'); btn.disabled = true;
            
            if (editingItemId) {
                const oldIdx = window.consumedItems.findIndex(i => i.id === editingItemId);
                if (oldIdx > -1) {
                    const old = window.consumedItems[oldIdx];
                    window.consumedToday.cal -= old.cal; window.consumedToday.protein -= old.p; window.consumedToday.fat -= old.f; window.consumedToday.carbs -= old.c;
                    window.consumedItems[oldIdx] = { id: editingItemId, name: aiName, cal: aiCal, p: aiP, f: aiF, c: aiC, al: aiAl, em: aiEmoji };
                }
                editingItemId = null; 
            } else {
                window.consumedItems.push({ id: Date.now(), name: aiName, cal: aiCal, p: aiP, f: aiF, c: aiC, al: aiAl, em: aiEmoji });
            }
            
            window.consumedToday.cal += aiCal; window.consumedToday.protein += aiP; window.consumedToday.fat += aiF; window.consumedToday.carbs += aiC;
            
            await saveToCloud('consumedToday', JSON.stringify(window.consumedToday)); await saveToCloud('consumedItems', JSON.stringify(window.consumedItems)); await saveToCloud('lastDate', getTodayDate());
            if (aiMsgId && !editingItemId) { 
                fetch(API_BASE_URL + '/saved', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': tg.initData || '' },
                    body: JSON.stringify({ mid: aiMsgId })
                }).catch(err => console.log("Не удалось обновить кнопку:", err));
            }
            btn.innerHTML = `<span data-i18n="btn_save_food">${t('btn_save_food')}</span>`; btn.disabled = false; window.history.replaceState({}, document.title, window.location.pathname);
            document.getElementById('sandbox-screen').style.display = 'none'; document.getElementById('bottom-nav').style.display = 'flex'; switchTab('diary-summary'); updateDashboard();

            if (typeof confetti === 'function') { confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 }, colors: ['#D2DB76', '#FFC3CC', '#28301C'] }); }
        }

        function cancelFood() { 
            editingItemId = null; window.history.replaceState({}, document.title, window.location.pathname); 
            document.getElementById('sandbox-screen').style.display = 'none'; 
            document.getElementById('bottom-nav').style.display = 'flex'; switchTab('diary-summary'); 
        }

        const waterGlasses = document.querySelectorAll('.glass'); const waterText = document.getElementById('water-text');

        function updateWaterUI(count) {
            waterGlasses.forEach((glass, index) => { if (index < count) { glass.classList.add('filled'); } else { glass.classList.remove('filled'); } });
            let liters = (count * 0.25).toFixed(2); waterText.innerText = t('water_drank').replace('{c}', count).replace('{l}', liters);
        }

        waterGlasses.forEach(glass => {
            glass.addEventListener('click', async function(e) {
                let clickedIndex = parseInt(this.getAttribute('data-index')); const today = getTodayDate(); let currentWater = window.waterHistory[today] || 0;
                let isAdding = true;

                if (clickedIndex === currentWater) { window.waterHistory[today] = currentWater - 1; isAdding = false; } 
                else { window.waterHistory[today] = clickedIndex; }
                
                updateWaterUI(window.waterHistory[today]);

                if (isAdding && typeof confetti === 'function') {
                    const rect = this.getBoundingClientRect();
                    const x = (rect.left + rect.width / 2) / window.innerWidth; const y = (rect.top + rect.height / 2) / window.innerHeight;
                    confetti({ particleCount: 20, spread: 50, startVelocity: 15, decay: 0.9, gravity: 1.2, colors: ['#8AB4F8', '#A2C2E8', '#D2DB76'], shapes: ['circle'], origin: { x, y }, zIndex: 2000, disableForReducedMotion: true, scalar: 0.4 });
                }

                await saveToCloud('water_history', JSON.stringify(window.waterHistory));
                if (document.getElementById('tab-calendar').classList.contains('active-screen')) { renderSelectedDay(); }
            });
        });
    </script>
